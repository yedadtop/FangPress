<!--
    页面：推文列表页（Tweets List）
    作用：按懒加载展示 type=tweet 的推文流，滚动到底部自动追加下一页
    数据：SSR 注入首屏到 #ssr-post-list，后续通过 /api/list?type=tweet&page=N 拉取
    配套：#tweet-load-more-sentinel（哨兵）、#tweet-end（结束标记）、#tweet-load-error（重试入口）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title data-ssr="site-title">推文</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="/tailwind.css">
    <style>
        :root {
            --reader-bg: hsl(40, 23%, 97%);
            --reader-text: hsl(24, 10%, 0%);
            --reader-size: 1.2rem;
            --reader-line-height: 1.85;
            --reader-width: 44rem;
            --reader-paragraph-spacing: 1.40em;
            --reader-letter-spacing: 0.02em;
            --reader-title-weight: 700;

            --font-serif-stack: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --font-sans-stack: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;

            --reader-title-font: var(--font-serif-stack);
            --reader-body-font: var(--font-serif-stack);
        }

        body { font-family: var(--reader-body-font); background-color: var(--reader-bg); color: var(--reader-text); letter-spacing: var(--reader-letter-spacing); }

        .font-serif { font-family: var(--reader-title-font); }
        .font-sans { font-family: var(--font-sans-stack); }

        html { scrollbar-width: thin; scrollbar-color: hsl(40, 10%, 80%) var(--reader-bg); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--reader-bg); }
        ::-webkit-scrollbar-thumb { background: hsl(40, 10%, 82%); border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: hsl(40, 10%, 70%); }

        .link-underline { background-image: linear-gradient(currentColor, currentColor); background-size: 0% 1px; background-repeat: no-repeat; background-position: 0 100%; transition: background-size 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
        .group:hover .link-underline, .link-underline:hover { background-size: 100% 1px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.4s ease-out both; }

        .tab-link[data-active="true"] { color: #0c0a09; }

        /* === 推文正文图片:响应式 + 点击查看 === */
        #ssr-post-list .tweet-img {
            display: block;
            max-width: 100%;
            height: auto;
            max-height: 18rem;
            margin: 0.625rem 0 0.125rem;
            border-radius: 0.5rem;
            cursor: zoom-in;
            background: rgba(0, 0, 0, 0.04);
            -webkit-user-drag: none;
            user-select: none;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.4s ease-out both; }
    </style>
</head>
<body class="min-h-screen selection:bg-stone-200" data-active-tab="tweets">

    <header id="site-header" class="fixed top-0 inset-x-0 w-full z-50">
        <div class="absolute inset-0 bg-[hsla(40,23%,97%,0.85)] backdrop-blur-md border-b border-stone-200/40"></div>
        <div class="relative max-w-screen-xl mx-auto px-6 md:px-10 h-16 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/" class="group inline-flex items-center" aria-label="返回首页">
                    <span id="ssr-header-title" class="font-serif text-base md:text-lg text-stone-900 tracking-tight link-underline" style="font-weight: var(--reader-title-weight);">博客</span>
                </a>
                <nav class="hidden md:flex items-center gap-5 text-sm font-sans" id="ssr-header-nav-wrap">
                    <div id="ssr-header-nav" data-ssr="header-nav" class="contents">
                        <a href="/posts" class="tab-link text-stone-500 hover:text-stone-900 transition-colors" data-tab="posts">文章</a>
                        <a href="/tweets" class="tab-link text-stone-500 hover:text-stone-900 transition-colors" data-tab="tweets">推文</a>
                    </div>
                </nav>
            </div>
            <div class="flex items-center gap-1">
                <button id="search-toggle" type="button" aria-label="搜索" class="p-2 text-stone-600 hover:text-stone-900 transition-colors duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                </button>
                <div class="relative md:hidden">
                    <button id="menu-toggle" type="button" aria-label="菜单" class="p-2 -mr-2 text-stone-600 hover:text-stone-900 transition-colors duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="3.75" y1="6.75" x2="20.25" y2="6.75"></line>
                            <line x1="3.75" y1="12" x2="20.25" y2="12"></line>
                            <line x1="3.75" y1="17.25" x2="20.25" y2="17.25"></line>
                        </svg>
                    </button>
                    <div id="mobile-menu" class="hidden absolute right-0 top-full mt-2 w-40 bg-[hsla(40,23%,97%,0.95)] backdrop-blur-md border border-stone-200/60 rounded-md shadow-lg overflow-hidden font-sans text-sm z-[55]">
                        <div id="ssr-mobile-nav" data-ssr="mobile-nav">
                            <a href="/posts" data-tab="posts" class="mobile-menu-link block px-4 py-2.5 text-stone-600 hover:bg-stone-100/60 hover:text-stone-900 transition-colors">文章</a>
                            <a href="/tweets" data-tab="tweets" class="mobile-menu-link block px-4 py-2.5 text-stone-600 hover:bg-stone-100/60 hover:text-stone-900 transition-colors border-t border-stone-200/60">推文</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="search-overlay" class="fixed inset-0 z-[60] hidden">
        <div id="search-backdrop" class="absolute inset-0 bg-stone-500/[0.35] backdrop-blur-[3px] fade-in"></div>

        <div class="relative max-w-[44rem] mx-auto px-6 pt-24 md:pt-28 fade-up">
            <div class="bg-[hsla(40,23%,97%,0.9)] border border-stone-200/60 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] overflow-hidden backdrop-blur-[13px]">
                <div class="flex items-center px-5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-stone-400 shrink-0" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                    <input id="search-input" type="text" placeholder="搜索文章…" class="flex-1 bg-transparent border-0 focus:outline-none focus:ring-0 py-5 px-4 text-stone-800 placeholder-stone-400 font-sans">
                    <button id="search-close" type="button" aria-label="关闭" class="p-1.5 text-stone-400 hover:text-stone-700 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M18 6 6 18"></path>
                            <path d="m6 6 12 12"></path>
                        </svg>
                    </button>
                </div>
                <div id="search-results" class="hidden max-h-[60vh] overflow-y-auto border-t border-stone-200/60 divide-y divide-stone-200/60 font-sans"></div>
            </div>
        </div>
    </div>

    <div class="max-w-[44rem] mx-auto px-6 pt-20 md:pt-28 pb-20 md:pb-28">
        <div id="status-loading" class="hidden py-20 text-center fade-in">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic tracking-widest">加载中...</p>
        </div>

        <div id="status-empty" class="hidden py-20 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic">这里还很安静</p>
        </div>
        <div id="status-error" class="hidden py-16 text-stone-400 text-sm tracking-wider">
            <span class="font-serif italic">数据获取失败</span> · 请刷新重试
        </div>

        <main id="ssr-post-list" data-ssr="post-list" class="hidden divide-y divide-stone-200/70" data-has-more="false" data-next-page="2"></main>

        <nav id="ssr-pagination" class="hidden flex justify-between items-center mt-12 pt-8 border-t border-stone-200/70 font-serif text-sm">
            <a id="ssr-prev-page" href="" class="hidden text-stone-500 hover:text-stone-900 transition-colors">← 上一页</a>
            <a id="ssr-next-page" href="" class="hidden text-stone-500 hover:text-stone-900 transition-colors ml-auto">下一页 →</a>
        </nav>

        <div id="tweet-load-more-sentinel" class="h-px w-full"></div>
        <div id="tweet-loading-more" class="hidden py-10 text-center fade-in">
            <div class="inline-block w-12 h-px bg-stone-300 mb-3"></div>
            <p class="font-serif text-stone-500 text-sm italic tracking-widest">正在加载更多推文…</p>
        </div>
        <div id="tweet-load-error" class="hidden py-10 text-stone-400 text-sm tracking-wider text-center">
            <span class="font-serif italic">加载失败</span> ·
            <button type="button" id="tweet-retry" class="underline underline-offset-2 hover:text-stone-700 transition-colors">重试</button>
        </div>
        <div id="tweet-end" class="hidden py-12 text-center text-stone-400 text-xs tracking-widest uppercase">
            — End of Stream —
        </div>
    </div>

    <script>
    (function () {
        // ⚡ 顶部 tab 高亮：基于 body[data-active-tab]
        var active = document.body.getAttribute('data-active-tab');
        if (active) {
            document.querySelectorAll('.tab-link, .mobile-menu-link').forEach(function (el) {
                if (el.getAttribute('data-tab') === active) {
                    el.setAttribute('data-active', 'true');
                    el.classList.remove('text-stone-500', 'text-stone-600');
                    el.classList.add('text-stone-900', 'font-medium');
                }
            });
        }

        var toggle   = document.getElementById('search-toggle');
        var overlay  = document.getElementById('search-overlay');
        var closeBtn = document.getElementById('search-close');
        var backdrop = document.getElementById('search-backdrop');
        var input    = document.getElementById('search-input');
        var results  = document.getElementById('search-results');
        if (!toggle || !overlay) return;

        var debounceTimer = null;
        var currentToken  = 0;
        var DEBOUNCE_MS   = 350;

        function escapeHTML(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDate(ts) {
            var d = new Date(ts);
            if (isNaN(d)) return '';
            // ⚡️ 与主页一致:仅显示月-日(如 "6-14")
            return (d.getMonth() + 1) + '-' + d.getDate();
        }

        function clearResults() {
            if (!results) return;
            results.innerHTML = '';
            results.classList.add('hidden');
        }

        function showMessage(text) {
            if (!results) return;
            results.innerHTML =
                '<p class="px-5 py-8 font-serif text-stone-500 text-base italic tracking-widest text-center">' +
                escapeHTML(text) +
                '</p>';
            results.classList.remove('hidden');
        }

        function renderList(items) {
            if (!results) return;
            if (!items.length) { showMessage('未找到相关文章'); return; }
            var html = items.map(function (p) {
                var slug  = encodeURIComponent(p.slug || '');
                var isTweet = p.type === 'tweet';
                var href  = isTweet ? '/tweet/' + slug : '/post/' + slug;

                if (isTweet) {
                    // ⚡ 推文搜索结果：显示内容摘要 + 「推文」标签 + 日期
                    var raw   = String(p.content || '');
                    var excerpt = raw.length > 80 ? raw.slice(0, 80) + '…' : raw;
                    var tweetBadge = '<span class="font-medium text-stone-500">推文</span>';
                    var dateStr  = formatDate(p.created_at);
                    var dateHTML = dateStr
                        ? '<span class="tabular-nums">' + escapeHTML(dateStr) + '</span>'
                        : '';
                    var tweetSep = dateHTML ? '<span class="text-stone-300">·</span>' : '';
                    return '<a href="' + href + '" class="block px-5 py-4 hover:bg-stone-100/60 transition-colors">' +
                        '<p class="font-serif text-sm leading-relaxed text-stone-700 line-clamp-2 whitespace-pre-wrap break-words">' +
                            escapeHTML(excerpt) +
                        '</p>' +
                        '<div class="mt-1.5 flex items-center gap-2 text-xs text-stone-400 tracking-wider font-sans">' +
                            tweetBadge + tweetSep + dateHTML +
                        '</div>' +
                    '</a>';
                }

                // 文章搜索结果：标题 + 分类 + 日期（原逻辑）
                var title    = escapeHTML(p.title || '');
                var cat      = p.category ? '<span>' + escapeHTML(p.category) + '</span>' : '';
                var dateStr  = formatDate(p.created_at);
                var dateHTML = dateStr
                    ? '<time class="tabular-nums">' + escapeHTML(dateStr) + '</time>'
                    : '';
                var sep = (cat && dateHTML) ? '<span class="text-stone-300">·</span>' : '';
                var meta = (cat || dateHTML)
                    ? '<div class="mt-1.5 flex items-center gap-2.5 text-xs text-stone-400 tracking-wider font-sans">' +
                        cat + sep + dateHTML +
                      '</div>'
                    : '';
                return '<a href="' + href + '" class="block px-5 py-4 hover:bg-stone-100/60 transition-colors">' +
                    '<h3 class="font-serif text-base md:text-lg leading-snug text-stone-900 link-underline pb-0.5">' +
                        title +
                    '</h3>' +
                    meta +
                '</a>';
            }).join('');
            results.innerHTML = html;
            results.classList.remove('hidden');
        }

        function cancelPending() {
            if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
            currentToken++;
        }

        function parseDateInput(raw) {
            var m = String(raw).match(/^(\d{4})[^\d]+(\d{1,2})[^\d]+(\d{1,2})$/);
            if (!m) return null;
            var y  = parseInt(m[1], 10);
            var mo = parseInt(m[2], 10);
            var d  = parseInt(m[3], 10);
            if (mo < 1 || mo > 12 || d < 1 || d > 31) return null;
            var test = new Date(Date.UTC(y, mo - 1, d));
            if (test.getUTCFullYear() !== y ||
                test.getUTCMonth()    !== mo - 1 ||
                test.getUTCDate()     !== d) return null;
            var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
            return y + '-' + pad(mo) + '-' + pad(d);
        }

        function fetchSearch(url) {
            cancelPending();
            showMessage('搜索中…');
            var token = currentToken;
            debounceTimer = setTimeout(function () {
                debounceTimer = null;
                fetch(url, {
                    headers: { 'Accept': 'application/json' },
                    cache: 'no-store'
                })
                .then(function (r) { return r.json(); })
                .then(function (json) {
                    if (token !== currentToken) return;
                    if (json && json.success && Array.isArray(json.data)) {
                        renderList(json.data);
                    } else {
                        showMessage('未找到相关文章');
                    }
                })
                .catch(function () {
                    if (token !== currentToken) return;
                    showMessage('搜索失败，请稍后再试');
                });
            }, DEBOUNCE_MS);
        }

        function runKeywordSearch(keyword) {
            fetchSearch('/api/search?q=' + encodeURIComponent(keyword));
        }

        function runDateSearch(dateStr) {
            fetchSearch('/api/search?date=' + encodeURIComponent(dateStr));
        }

        var open = function () {
            overlay.classList.remove('hidden');
            requestAnimationFrame(function () { input && input.focus(); });
        };
        var close = function () {
            overlay.classList.add('hidden');
            if (input) input.value = '';
            cancelPending();
            clearResults();
        };

        toggle.addEventListener('click', open);
        closeBtn && closeBtn.addEventListener('click', close);
        backdrop && backdrop.addEventListener('click', close);
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && !overlay.classList.contains('hidden')) close();
        });

        if (input) {
            input.addEventListener('input', function () {
                var keyword = input.value.trim();
                if (!keyword) { cancelPending(); clearResults(); return; }
                var dateStr = parseDateInput(keyword);
                if (dateStr) {
                    runDateSearch(dateStr);
                } else {
                    runKeywordSearch(keyword);
                }
            });
        }
    })();

    (function () {
        var menuToggle = document.getElementById('menu-toggle');
        var mobileMenu = document.getElementById('mobile-menu');
        if (!menuToggle || !mobileMenu) return;

        menuToggle.addEventListener('click', function (e) {
            e.stopPropagation();
            mobileMenu.classList.toggle('hidden');
        });
        document.addEventListener('click', function (e) {
            if (!mobileMenu.classList.contains('hidden') &&
                !mobileMenu.contains(e.target) &&
                !menuToggle.contains(e.target)) {
                mobileMenu.classList.add('hidden');
            }
        });
    })();

    // ⚡️ 推文懒加载：滚动到哨兵时后台拉取 /api/list?type=tweet&page=N+1 并就地拼接
    (function () {
        var list     = document.getElementById('ssr-post-list');
        var sentinel = document.getElementById('tweet-load-more-sentinel');
        var loading  = document.getElementById('tweet-loading-more');
        var errEl    = document.getElementById('tweet-load-error');
        var retryBtn = document.getElementById('tweet-retry');
        var endEl    = document.getElementById('tweet-end');
        if (!list || !sentinel) return;

        var hasMore   = list.getAttribute('data-has-more') === 'true';
        var nextPage  = parseInt(list.getAttribute('data-next-page') || '2', 10);
        var inFlight  = false;
        var observer  = null;

        function escapeHTML(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDate(ts) {
            if (!ts) return '';
            var d = new Date(ts);
            if (isNaN(d)) return '';
            // ⚡️ 与主页一致:仅显示月-日(如 "6-14")
            return (d.getMonth() + 1) + '-' + d.getDate();
        }

        var TWEET_IMG_RE = /!\[([^\]]*?)\]\((https?:\/\/[^)\s<]+|data:image\/[^)\s<]+)\)/gi;

        function renderTweetContent(escapedHtml) {
            return String(escapedHtml == null ? '' : escapedHtml).replace(
                TWEET_IMG_RE,
                function (m, alt, url) {
                    return '<img class="tweet-img" src="' + url + '" alt="' + alt + '" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'" />';
                }
            );
        }

        
        function renderItem(p) {
            var slug   = encodeURIComponent(p.slug || '');
            var raw    = (p.content != null && p.content !== '') ? p.content : (p.excerpt || '');
            var d      = formatDate(p.created_at);
            var author = p.author || null;
            var nickname = (author && author.nickname) ? author.nickname : 'Admin';
            var avatar   = (author && author.avatar)   ? author.avatar   : null;

            var placeholderPath = 'M12 12c2.7 0 4.875-2.175 4.875-4.875S14.7 2.25 12 2.25 7.125 4.425 7.125 7.125 9.3 12 12 12zm0 2.25c-3.45 0-10.125 1.725-10.125 5.25v2.25h20.25v-2.25c0-3.525-6.675-5.25-10.125-5.25z';

            // 头像内联:有 URL → img + hidden 占位;无 URL → 直接占位
            var avatarInner = avatar
                ? '<img class="w-full h-full object-cover" src="' + escapeHTML(avatar) + '" alt="" referrerpolicy="no-referrer" onerror="this.classList.add(\'hidden\'); this.nextElementSibling.classList.remove(\'hidden\');" />' +
                  '<svg class="w-5 h-5 text-stone-300 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="' + placeholderPath + '"/></svg>'
                : '<svg class="w-5 h-5 text-stone-300" fill="currentColor" viewBox="0 0 24 24"><path d="' + placeholderPath + '"/></svg>';

            var timeHTML = d
                ? '<time class="text-stone-400 text-xs font-sans tabular-nums whitespace-nowrap">' + escapeHTML(d) + '</time>'
                : '';

            return '<article class="fade-up group" data-ssr-item>' +
                '<a href="/tweet/' + slug + '" class="flex gap-3 px-3 py-3 -mx-3 rounded-lg hover:bg-stone-100/60 transition-colors">' +
                    '<div class="shrink-0">' +
                        '<div class="w-10 h-10 md:w-11 md:h-11 rounded-full bg-stone-100 border border-stone-200/60 overflow-hidden flex items-center justify-center">' +
                            avatarInner +
                        '</div>' +
                    '</div>' +
                    '<div class="flex-1 min-w-0">' +
                        '<div class="flex items-baseline gap-2 flex-wrap text-sm leading-tight">' +
                            '<span class="font-medium text-stone-900 truncate">' + escapeHTML(nickname) + '</span>' +
                            timeHTML +
                        '</div>' +
                        '<div class="font-serif text-stone-700 text-base leading-relaxed whitespace-pre-wrap break-words mt-1">' + renderTweetContent(escapeHTML(raw)) + '</div>' +
                    '</div>' +
                '</a>' +
            '</article>';
        }

        function appendItems(items) {
            if (!items || !items.length) return;
            var wrap = document.createElement('div');
            wrap.innerHTML = items.map(renderItem).join('');
            while (wrap.firstChild) list.appendChild(wrap.firstChild);
        }

        function setLoading(v) {
            inFlight = v;
            if (loading) loading.classList.toggle('hidden', !v);
        }

        function showError() {
            if (errEl) errEl.classList.remove('hidden');
        }

        function hideError() {
            if (errEl) errEl.classList.add('hidden');
        }

        function finish(hasNext) {
            hasMore = hasNext;
            if (!hasMore) {
                if (sentinel) sentinel.style.display = 'none';
                if (endEl) endEl.classList.remove('hidden');
                if (observer) observer.disconnect();
            }
        }

        function loadMore() {
            if (inFlight || !hasMore) return;
            hideError();
            setLoading(true);

            fetch('/api/list?type=tweet&page=' + nextPage, {
                headers: { 'Accept': 'application/json' },
                cache: 'no-store'
            })
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (json) {
                // 兼容多种后端返回结构：
                //   1) 顶层数组             [ {...}, ... ]
                //   2) { success, data, has_more }   ← 当前 list.js 实际返回
                //   3) { data } / { items }（防缓存协议变动）
                var items = null;
                var hasNext = false;
                if (Array.isArray(json)) {
                    items = json;
                } else if (json && typeof json === 'object') {
                    // 明确 success:false 才视为业务失败
                    if (json.success === false) {
                        showError();
                        return;
                    }
                    if (Array.isArray(json.data)) {
                        items = json.data;
                        hasNext = json.has_more === true;
                    } else if (Array.isArray(json.items)) {
                        items = json.items;
                        hasNext = json.has_more === true || json.hasMore === true;
                    }
                }

                // 拿到可解析的 data → 请求本身是成功的，清掉错误条
                hideError();

                if (Array.isArray(items)) {
                    if (items.length) {
                        appendItems(items);
                        nextPage++;
                        list.setAttribute('data-next-page', String(nextPage));
                        finish(hasNext);
                    } else {
                        // 空数据：视为正常结束（已无更多）
                        finish(false);
                    }
                } else {
                    // 响应结构完全无法识别才报错
                    showError();
                }
            })
            .catch(function () {
                showError();
            })
            .then(function () {
                setLoading(false);
            });
        }

        if (retryBtn) {
            retryBtn.addEventListener('click', function (e) {
                e.preventDefault();
                loadMore();
            });
        }

        if (!hasMore) {
            // 一次性内容：直接展示结束标记,无需观察哨兵
            if (sentinel) sentinel.style.display = 'none';
            if (endEl) endEl.classList.remove('hidden');
            return;
        }

        if (!('IntersectionObserver' in window)) {
            // 旧浏览器兜底：监听 scroll,到底部 300px 内触发
            var triggered = false;
            window.addEventListener('scroll', function () {
                if (triggered || inFlight || !hasMore) return;
                var rect = sentinel.getBoundingClientRect();
                if (rect.top < (window.innerHeight || document.documentElement.clientHeight) + 300) {
                    triggered = true;
                    loadMore();
                    setTimeout(function () { triggered = false; }, 200);
                }
            }, { passive: true });
            return;
        }

        observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) loadMore();
            });
        }, { rootMargin: '300px 0px' });
        observer.observe(sentinel);
    })();
    </script>

    <script src="/fancybox-loader.js" defer></script>
    <script src="/verify-optimize.js" defer></script>
</body>
