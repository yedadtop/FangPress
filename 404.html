<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="页面未找到">
    <title>页面未找到 · 404</title>
    <link rel="preload" href="/tailwind.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/tailwind.css"></noscript>
    <style>
        :root {
            --reader-bg: hsl(40, 23%, 97%);
            --reader-text: hsl(24, 10%, 0%);
            --reader-title-weight: 700;
            --font-serif-stack: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --font-sans-stack: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --reader-title-font: var(--font-serif-stack);
            --reader-body-font: var(--font-serif-stack);
        }
        body { font-family: var(--reader-body-font); background-color: var(--reader-bg); color: var(--reader-text); letter-spacing: 0.02em; }
        .font-serif { font-family: var(--reader-title-font); }
        .font-sans { font-family: var(--font-sans-stack); }

        .link-underline { background-image: linear-gradient(currentColor, currentColor); background-size: 0% 1px; background-repeat: no-repeat; background-position: 0 100%; transition: background-size 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
        .group:hover .link-underline, .link-underline:hover { background-size: 100% 1px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    </style>
</head>
<body>
    <header id="site-header" class="fixed top-0 inset-x-0 w-full z-50">
        <div class="absolute inset-0 bg-[hsla(40,23%,97%,0.85)] backdrop-blur-md border-b border-stone-200/40"></div>
        <div class="relative max-w-screen-xl mx-auto px-6 md:px-10 h-16 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/" class="group inline-flex items-center" aria-label="返回首页">
                    <span class="font-serif text-base md:text-lg text-stone-900 tracking-tight link-underline" style="font-weight: var(--reader-title-weight);">博客</span>
                </a>
                <nav class="hidden md:flex items-center gap-5 text-sm font-sans">
                    <a href="/posts" class="text-stone-500 hover:text-stone-900 transition-colors">文章</a>
                    <a href="/tweets" class="text-stone-500 hover:text-stone-900 transition-colors">推文</a>
                </nav>
            </div>
            <div class="text-xs font-sans text-stone-400 tracking-widest uppercase">404 Not Found</div>
        </div>
    </header>

    <main class="max-w-[44rem] mx-auto px-6 pt-32 md:pt-40 pb-20 text-center fade-up">
        <p class="font-serif text-stone-300 text-[7rem] md:text-[9rem] leading-none font-medium select-none" style="font-weight: var(--reader-title-weight);">404</p>

        <div class="inline-block w-12 h-px bg-stone-300 my-8"></div>

        <h1 class="font-serif text-stone-900 text-2xl md:text-3xl mb-3" style="font-weight: var(--reader-title-weight);">这里什么都没有</h1>
        <p class="font-serif text-stone-500 text-base italic mb-10">你访问的页面似乎已经离开，去别处逛逛吧。</p>

        <div class="flex items-center justify-center gap-6 text-sm font-sans">
            <a href="/" class="text-stone-900 hover:text-stone-600 transition-colors link-underline">← 返回首页</a>
            <span class="text-stone-300">/</span>
            <a href="/posts" class="text-stone-500 hover:text-stone-900 transition-colors link-underline">浏览文章</a>
        </div>
    </main>

    <footer class="max-w-[44rem] mx-auto px-6 pb-12 text-center text-stone-400 text-xs tracking-widest uppercase">
        — End of Stream —
    </footer>
    <script src="/verify-optimize.js" defer></script>
</body>
</html>
