<!--
    页面：推文详情页（Tweet Detail）
    作用：根据 URL 中的 slug 渲染单条推文，与 tweets.html 列表风格保持一致
    数据：SSR 注入到
          - #ssr-tweet-avatar   头像（img + onerror 兜底 SVG）
          - #ssr-tweet-nickname 昵称
          - #ssr-tweet-time     发布时间
          - #ssr-tweet-content  推文正文（whitespace-pre-wrap）
    状态：#status-loading 加载中 / #status-bad-slug 缺 slug / #status-not-found 不存在 / #status-error 失败
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="" data-ssr="meta-description">
    <meta property="og:title" content="" data-ssr="og-title">
    <meta property="og:description" content="" data-ssr="og-description">
    <meta property="og:type" content="article">
    <title data-ssr="tweet-title">推文</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preload" href="/tailwind.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/tailwind.css"></noscript>
    <style>
        :root {
            --font-serif: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        body { font-family: var(--font-sans); }
        .font-serif { font-family: var(--font-serif); }

        /* === 推文正文图片:响应式 + 点击查看 === */
        #ssr-tweet-content .tweet-img,
        .tweet-detail-content .tweet-img {
            display: block;
            max-width: 100%;
            height: auto;
            max-height: 28rem;
            margin: 0.875rem 0 0.25rem;
            border-radius: 0.625rem;
            cursor: zoom-in;
            background: rgba(0, 0, 0, 0.04);
            -webkit-user-drag: none;
            user-select: none;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.4s ease-out both; }
    </style>
</head>
<body class="bg-[#fafaf9] text-stone-800 min-h-screen selection:bg-stone-200">

    <div class="max-w-2xl mx-auto px-6 md:px-10 py-10 md:py-14">

        <article id="ssr-tweet-article" data-ssr="tweet-article" class="hidden">
            <div class="flex items-start gap-3">
                <!-- 头像：SSR 注入 <img> + 占位 SVG -->
                <div class="shrink-0">
                    <div id="ssr-tweet-avatar" class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-stone-100 border border-stone-200/60 overflow-hidden flex items-center justify-center">
                    </div>
                </div>
                <!-- 昵称 + 发布时间 -->
                <div class="flex-1 min-w-0 pt-1">
                    <div id="ssr-tweet-nickname" class="font-medium text-stone-900 text-base truncate">—</div>
                    <time id="ssr-tweet-time" class="text-xs text-stone-400 font-sans tabular-nums tracking-wider whitespace-nowrap">—</time>
                </div>
            </div>

            <div id="ssr-tweet-content" data-ssr="tweet-content" class="font-serif text-stone-700 text-base leading-relaxed whitespace-pre-wrap break-words pl-[60px] md:pl-[68px]">
            </div>
        </article>

        <div id="status-loading" class="hidden py-24 text-center fade-in">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic tracking-widest">加载中...</p>
        </div>

        <div id="status-bad-slug" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic">缺少推文标识</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider font-sans">URL 中未提供 slug 参数</p>
        </div>
        <div id="status-not-found" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic">这条推文不存在</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider font-sans">它可能已被删除,或链接有误</p>
        </div>
        <div id="status-error" class="hidden py-24 text-stone-400 text-sm tracking-wider text-center">
            <span class="italic">内容加载失败</span> · 请刷新重试
        </div>
    </div>

    <footer class="max-w-2xl mx-auto px-6 md:px-10 pb-12 text-center text-stone-400 text-xs tracking-widest uppercase font-sans">
        — End of Tweet —
    </footer>

    <script src="/fancybox-loader.js" defer></script>
</body>
</html>
