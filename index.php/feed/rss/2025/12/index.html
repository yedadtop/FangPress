<item rdf:about="http://10.0.0.8:88/index.php/3.html">
<title>惜秦皇汉武</title>
<link>http://10.0.0.8:88/index.php/3.html</link>
<dc:date>2025-12-05T21:12:00+08:00</dc:date>
<description>北国风光，千里冰封，万里雪飘。望长城内外，惟余莽莽；大河上下，顿失滔滔。山舞银蛇，原驰蜡象，欲与天公试比高。须晴日，看红妆素裹，分外妖娆。江山如此多娇，引无数英雄竞折腰。惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。一代天骄，成吉思汗，只识弯弓射大雕。俱往矣，数风流人物，还看今朝。</description>
</item>
