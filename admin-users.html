<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 · 创作中心</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --font-serif: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        body { font-family: var(--font-sans); }
        .font-serif { font-family: var(--font-serif); }
    </style>
</head>
<body class="bg-[#fafaf9] text-stone-800 min-h-screen">

    <div class="max-w-2xl mx-auto px-6 md:px-10 py-10 md:py-14">

        <header class="mb-10">
            <p class="text-xs uppercase tracking-widest text-stone-400">Account</p>
            <h1 class="font-serif text-3xl md:text-[2rem] font-medium text-stone-900 mt-2">用户管理</h1>
            <p class="text-sm text-stone-500 mt-2">修改登录凭证与对外展示信息</p>
        </header>

        <div id="meta-card" class="hidden mb-8 flex items-center gap-3 px-5 py-3.5 bg-white border border-stone-200/60 rounded-xl text-sm text-stone-500">
            <svg class="w-4 h-4 text-stone-400 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>注册于 <span id="meta-created" class="font-medium text-stone-700">—</span></span>
            <span class="mx-1 text-stone-300">·</span>
            <span>账户 ID <span id="meta-id" class="font-mono text-stone-700">—</span></span>
        </div>

        <div id="loading" class="hidden">
        </div>

        <form id="user-form" class="hidden space-y-8">

            <section>
                <h2 class="text-[10px] uppercase tracking-widest text-stone-400 mb-3">登录账号</h2>
                <div class="bg-white border border-stone-200/60 rounded-2xl p-6 space-y-5">
                    <div>
                        <label class="block text-xs text-stone-600 mb-1.5">用户名</label>
                        <input type="text" id="username"
                               class="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-md text-sm font-mono focus:outline-none focus:border-stone-500"
                               maxlength="40" required>
                        <p class="text-[11px] text-stone-400 mt-1.5">下次登录请用此用户名</p>
                    </div>

                    <div>
                        <label class="block text-xs text-stone-600 mb-1.5">作者昵称</label>
                        <input type="text" id="nickname"
                               class="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-md text-sm focus:outline-none focus:border-stone-500"
                               maxlength="40" placeholder="显示在后台的称呼">
                        <p class="text-[11px] text-stone-400 mt-1.5">留空则与用户名相同</p>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-[10px] uppercase tracking-widest text-stone-400 mb-3">对外展示</h2>
                <div class="bg-white border border-stone-200/60 rounded-2xl p-6">
                    <div class="flex items-start gap-5">
                        <!-- 头像预览 -->
                        <div class="shrink-0">
                            <div id="avatar-preview-wrap" class="w-20 h-20 rounded-full bg-stone-100 border border-stone-200/60 overflow-hidden flex items-center justify-center">
                                <img id="avatar-preview" class="w-full h-full object-cover hidden" alt="" referrerpolicy="no-referrer" />
                                <svg id="avatar-placeholder" class="w-9 h-9 text-stone-300" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 12c2.7 0 4.875-2.175 4.875-4.875S14.7 2.25 12 2.25 7.125 4.425 7.125 7.125 9.3 12 12 12zm0 2.25c-3.45 0-10.125 1.725-10.125 5.25v2.25h20.25v-2.25c0-3.525-6.675-5.25-10.125-5.25z"/>
                                </svg>
                            </div>
                        </div>
                        <!-- URL 输入 -->
                        <div class="flex-1 min-w-0 space-y-1.5">
                            <label class="block text-xs text-stone-600">头像链接</label>
                            <div class="flex items-stretch gap-2">
                                <input type="url" id="avatar" inputmode="url" autocomplete="off"
                                       class="flex-1 min-w-0 px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-md text-sm font-mono focus:outline-none focus:border-stone-500"
                                       maxlength="2048" placeholder="https://..." />
                                <button type="button" id="avatar-clear-btn" onclick="clearAvatar()"
                                        class="hidden shrink-0 px-3 py-2.5 text-stone-500 hover:text-red-500 border border-stone-200 hover:border-red-200 rounded-md text-sm transition-colors cursor-pointer">
                                    清除
                                </button>
                            </div>
                            <p class="text-[11px] text-stone-400 leading-relaxed">仅支持 <code class="text-stone-500 font-mono">http://</code> / <code class="text-stone-500 font-mono">https://</code> 直链，公开页面与后台会展示此头像。留空则恢复默认占位。</p>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-[10px] uppercase tracking-widest text-stone-400 mb-3">密码</h2>
                <div class="bg-white border border-stone-200/60 rounded-2xl p-6 space-y-5">
                    <div>
                        <label class="block text-xs text-stone-600 mb-1.5">新密码</label>
                        <input type="password" id="password"
                               class="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-md text-sm font-mono focus:outline-none focus:border-stone-500"
                               placeholder="留空则不修改">
                    </div>
                    <div>
                        <label class="block text-xs text-stone-600 mb-1.5">确认新密码</label>
                        <input type="password" id="password-confirm"
                               class="w-full px-3 py-2.5 bg-stone-50 border border-stone-200 rounded-md text-sm font-mono focus:outline-none focus:border-stone-500"
                               placeholder="再次输入新密码">
                    </div>
                    <div class="flex items-start gap-2 pt-1 text-[11px] text-stone-500 leading-relaxed">
                        <svg class="w-3.5 h-3.5 mt-0.5 text-amber-500 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                        </svg>
                        <span>本系统对密码不做任何长度或复杂度限制。出于安全考虑，建议使用至少 12 位、混合大小写与符号的强密码，并妥善保存。修改密码会立即在数据库生效；当前浏览器会话的 Token 会被自动替换，若在其它设备登录过，需要重新登录。</span>
                    </div>
                </div>
            </section>

            <div class="flex items-center gap-3 pt-2">
                <button type="button" onclick="saveUser()"
                        class="px-5 py-2.5 bg-stone-900 hover:bg-stone-800 text-white rounded-md text-sm font-medium transition-colors cursor-pointer">
                    保存修改
                </button>
                <button type="button" onclick="loadUser()"
                        class="px-3 py-2.5 text-stone-500 hover:text-stone-900 text-sm transition-colors cursor-pointer">
                    放弃修改
                </button>
                <span id="status-text" class="ml-auto text-xs italic font-serif hidden"></span>
            </div>
        </form>
    </div>

    <script>
        function getToken() {
            return localStorage.getItem('admin_token');
        }

        function showStatus(msg, kind) {
            const el = document.getElementById('status-text');
            el.textContent = msg;
            el.classList.remove('hidden');
            el.className = `ml-auto text-xs italic font-serif ${kind === 'error' ? 'text-red-500' : 'text-emerald-600'}`;
            if (kind !== 'error') {
                setTimeout(() => el.classList.add('hidden'), 2400);
            }
        }

        function formatDate(ts) {
            const d = new Date(ts);
            if (isNaN(d)) return '';
            return `${d.getFullYear()} · ${String(d.getMonth() + 1).padStart(2, '0')} · ${String(d.getDate()).padStart(2, '0')}`;
        }

        // -------- 头像预览 --------
        function isValidAvatarUrl(url) {
            if (!url) return false;
            try {
                const u = new URL(url);
                return (u.protocol === 'http:' || u.protocol === 'https:') && !!u.hostname;
            } catch (_) {
                return false;
            }
        }

        function applyAvatar(url) {
            const input = document.getElementById('avatar');
            const img = document.getElementById('avatar-preview');
            const placeholder = document.getElementById('avatar-placeholder');
            const clearBtn = document.getElementById('avatar-clear-btn');

            const trimmed = (url || '').trim();
            if (isValidAvatarUrl(trimmed)) {
                // 仅当 src 真的变化才赋值，避免每输入一字符都重新加载
                if (img.getAttribute('src') !== trimmed) {
                    img.setAttribute('src', trimmed);
                }
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                img.removeAttribute('src');
                img.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
            clearBtn.classList.toggle('hidden', !trimmed);
            if (input.value !== trimmed) input.value = trimmed;
        }

        function clearAvatar() {
            applyAvatar('');
            document.getElementById('avatar').focus();
        }

        async function loadUser() {
            if (!getToken()) return;

            try {
                const res = await fetch('/api/user', {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const result = await res.json();

                if (result.success && result.data) {
                    const u = result.data;
                    document.getElementById('username').value = u.username || '';
                    document.getElementById('nickname').value = u.nickname || '';
                    applyAvatar(u.avatar || '');
                    document.getElementById('meta-id').textContent = '#' + (u.id || '—');
                    document.getElementById('meta-created').textContent = formatDate(u.created_at) || '—';

                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('meta-card').classList.remove('hidden');
                    document.getElementById('user-form').classList.remove('hidden');
                } else {
                    document.getElementById('loading').textContent = '加载失败: ' + (result.error || '未知错误');
                }
            } catch (e) {
                document.getElementById('loading').textContent = '网络异常';
            }
        }

        async function saveUser() {
            const token = getToken();
            if (!token) return;

            const username = document.getElementById('username').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const avatar = document.getElementById('avatar').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;

            if (!username) {
                showStatus('用户名不能为空', 'error');
                return;
            }
            if (password) {
                if (password !== passwordConfirm) {
                    showStatus('两次输入的密码不一致', 'error');
                    return;
                }
            }

            // ⚡ 头像始终随表单一起提交（空串 → 后端清空 D1 字段 + KV 同步）
            const body = { username, nickname, avatar };
            if (password) {
                body.password = password;
                // ⚡ 修复 11：把后端强制要 passwordConfirm 一并提交
                body.passwordConfirm = passwordConfirm;
            }

            const btn = document.querySelector('button[onclick="saveUser()"]');
            btn.disabled = true;
            btn.classList.add('opacity-60', 'cursor-wait');

            try {
                const res = await fetch('/api/user/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                const result = await res.json();

                if (result.success) {
                    // 清理密码框
                    document.getElementById('password').value = '';
                    document.getElementById('password-confirm').value = '';

                    // 关键：若密码已更新，刷新 localStorage 的 token
                    if (result.newToken) {
                        localStorage.setItem('admin_token', result.newToken);
                    }
                    // 同步侧栏显示的昵称
                    const displayName = nickname || username;
                    localStorage.setItem('admin_nickname', displayName);
                    try {
                        const nameEl = window.top.document.getElementById('admin-name');
                        if (nameEl) nameEl.textContent = displayName;
                    } catch (e) { /* 忽略 */ }

                    // 同步头像到 localStorage，便于侧栏 / 其它后台页面直接读
                    localStorage.setItem('admin_avatar', avatar || '');

                    showStatus(result.message || '已保存', 'ok');
                } else {
                    showStatus('失败: ' + (result.error || '未知错误'), 'error');
                }
            } catch (e) {
                showStatus('网络异常，请稍后重试', 'error');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-60', 'cursor-wait');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUser();

            // 头像输入实时预览（debounce 200ms，避免每输入一字符都重设 src）
            let timer = null;
            const avatarInput = document.getElementById('avatar');
            avatarInput.addEventListener('input', () => {
                clearTimeout(timer);
                timer = setTimeout(() => applyAvatar(avatarInput.value), 200);
            });
            // 失焦立即同步一次（保证清空 / 粘贴后立刻生效）
            avatarInput.addEventListener('blur', () => applyAvatar(avatarInput.value));

            // 头像图片加载失败 → 回退到占位（不阻断用户编辑）
            const avatarImg = document.getElementById('avatar-preview');
            avatarImg.addEventListener('error', () => {
                avatarImg.classList.add('hidden');
                document.getElementById('avatar-placeholder').classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
