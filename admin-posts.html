<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 · 创作中心</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --font-serif: serif;
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body { font-family: var(--font-sans); }
        .font-serif { font-family: var(--font-serif); }

        .post-row { transition: background-color .2s ease; }
        .post-row:hover { background: #fafaf9; }
        .action-btn { transition: color .2s ease, background-color .2s ease; }
    </style>
</head>
<body class="bg-[#fafaf9] text-stone-800 min-h-screen">

    <div class="max-w-5xl mx-auto px-6 md:px-10 py-10 md:py-14">

        <header class="mb-8 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
            <div>
                <p class="text-xs uppercase tracking-widest text-stone-400">Posts</p>
                <h1 class="font-serif text-3xl md:text-[2rem] font-medium text-stone-900 mt-2">文章管理</h1>
                <p class="text-sm text-stone-500 mt-2">共 <span id="total-count" class="font-semibold text-stone-700">0</span> 篇 · 当前显示 <span id="visible-count" class="font-semibold text-stone-700">0</span> 篇</p>
            </div>
            <div class="flex items-center gap-2 self-start md:self-auto">
                <a href="admin-edit.html?tweet=1" target="admin-frame"
                   class="inline-flex items-center gap-1.5 px-4 py-2 bg-white hover:bg-stone-50 text-stone-700 text-sm border border-stone-200 rounded-md transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
                    </svg>
                    发推文
                </a>
                <a href="admin-edit.html" target="admin-frame"
                   class="inline-flex items-center gap-1.5 px-4 py-2 bg-stone-900 hover:bg-stone-800 text-white text-sm rounded-md transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    撰写新文
                </a>
            </div>
        </header>

        <!-- ⚡ 批量操作浮动条：选中项 > 0 时从顶部滑入 -->
        <div id="batch-bar" class="hidden sticky top-3 z-20 mb-4 flex items-center justify-between gap-3 px-4 py-2.5 bg-stone-900 text-white text-sm rounded-lg shadow-lg">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                已选 <span id="selected-count" class="font-semibold">0</span> 篇
            </div>
            <div class="flex items-center gap-2">
                <button id="batch-cancel" class="px-3 py-1.5 text-xs text-stone-200 hover:text-white hover:bg-stone-700 rounded transition-colors cursor-pointer">
                    取消
                </button>
                <button id="batch-delete" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs bg-red-600 hover:bg-red-500 text-white rounded transition-colors cursor-pointer">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                    </svg>
                    批量删除
                </button>
            </div>
        </div>

        <div class="mb-6 flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
            <div class="relative flex-1">
                <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-stone-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                </svg>
                <input id="search" type="text" placeholder="搜索标题或路径..."
                       class="w-full pl-9 pr-3 py-2 bg-white border border-stone-200 rounded-md text-sm focus:outline-none focus:border-stone-500">
            </div>
            <select id="filter-category" class="px-3 py-2 bg-white border border-stone-200 rounded-md text-sm focus:outline-none focus:border-stone-500 cursor-pointer">
                <option value="">全部分类</option>
            </select>
            <select id="filter-type" class="px-3 py-2 bg-white border border-stone-200 rounded-md text-sm focus:outline-none focus:border-stone-500 cursor-pointer">
                <option value="">全部类型</option>
                <option value="post">文章</option>
                <option value="tweet">推文</option>
            </select>
        </div>

        <div id="loading" class="hidden">
        </div>

        <div id="empty" class="hidden py-20 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif italic text-stone-500 text-base">这里还很安静</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider">点击右上角「撰写新文」开始</p>
        </div>

        <div id="no-match" class="hidden py-16 text-center text-stone-400 text-sm font-serif italic">
            没有匹配的文章
        </div>

        <div id="posts-list" class="hidden bg-white rounded-2xl border border-stone-200/60 divide-y divide-stone-200/60 overflow-hidden"></div>

    </div>

    <script>
        let allPosts = [];
        // ⚡ 当前选中的文章 id 集合（字符串型，避免数字/字符串比较的坑）
        const selectedIds = new Set();

        function getToken() {
            return localStorage.getItem('admin_token');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDate(ts) {
            const d = new Date(ts);
            if (isNaN(d)) return '';
            return `${d.getFullYear()} · ${String(d.getMonth() + 1).padStart(2, '0')} · ${String(d.getDate()).padStart(2, '0')}`;
        }

        async function loadPosts() {
            if (!getToken()) {
                // 没 token 不做任何事，外层 admin.html 会兜底处理
                document.getElementById('loading').classList.add('hidden');
                return;
            }

            try {
                const res = await fetch('/api/list');
                const result = await res.json();

                document.getElementById('loading').classList.add('hidden');

                if (result.success && Array.isArray(result.data)) {
                    allPosts = result.data;
                    document.getElementById('total-count').textContent = allPosts.length;

                    // 收集分类
                    const cats = [...new Set(allPosts.map(p => p.category || '未分类'))];
                    const select = document.getElementById('filter-category');
                    cats.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c;
                        opt.textContent = c;
                        select.appendChild(opt);
                    });

                    renderPosts();
                } else {
                    document.getElementById('empty').classList.remove('hidden');
                    document.getElementById('total-count').textContent = 0;
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = '<span class="font-serif italic text-stone-400">数据获取失败，请刷新</span>';
            }
        }

        function renderPosts() {
            const search = document.getElementById('search').value.trim().toLowerCase();
            const cat = document.getElementById('filter-category').value;
            const typeFilter = document.getElementById('filter-type').value;

            let posts = allPosts;
            if (cat) posts = posts.filter(p => (p.category || '未分类') === cat);
            if (typeFilter) posts = posts.filter(p => (p.type || 'post') === typeFilter);
            if (search) {
                posts = posts.filter(p =>
                    (p.title || '').toLowerCase().includes(search) ||
                    (p.slug || '').toLowerCase().includes(search)
                );
            }

            const listEl = document.getElementById('posts-list');
            const emptyEl = document.getElementById('empty');
            const noMatchEl = document.getElementById('no-match');
            document.getElementById('visible-count').textContent = posts.length;

            if (allPosts.length === 0) {
                emptyEl.classList.remove('hidden');
                listEl.classList.add('hidden');
                noMatchEl.classList.add('hidden');
                return;
            }

            if (posts.length === 0) {
                noMatchEl.classList.remove('hidden');
                listEl.classList.add('hidden');
                emptyEl.classList.add('hidden');
                return;
            }

            noMatchEl.classList.add('hidden');
            emptyEl.classList.add('hidden');
            listEl.classList.remove('hidden');

            listEl.innerHTML = `
                <div class="px-5 md:px-6 py-2.5 bg-stone-50/60 border-b border-stone-200/60 flex items-center gap-3 text-[11px] uppercase tracking-wider text-stone-500">
                    <label class="inline-flex items-center gap-2 cursor-pointer select-none">
                        <input type="checkbox" id="select-all" class="w-3.5 h-3.5 accent-stone-900 cursor-pointer">
                        <span>全选 / 反选</span>
                    </label>
                    <span class="ml-auto text-stone-400 normal-case tracking-normal">${posts.length} 项</span>
                </div>
            ` + posts.map(p => {
                const postType = p.type || 'post';
                const isTweet = postType === 'tweet';
                const typeBadge = isTweet
                    ? '<span class="shrink-0 text-[10px] uppercase tracking-wider font-semibold text-stone-600 border border-stone-300 px-1.5 py-0.5 rounded-sm bg-stone-200/40">推文</span>'
                    : '<span class="shrink-0 text-[10px] uppercase tracking-wider font-semibold text-stone-500 border border-stone-200 px-1.5 py-0.5 rounded-sm bg-stone-100/50">文章</span>';
                // 推文无标题时显示 slug 摘要
                const titleDisplay = isTweet && !p.title
                    ? `<span class="text-stone-400 italic font-serif">${escapeHtml((p.excerpt || p.slug || '').slice(0, 60))}${(p.excerpt || '').length > 60 ? '…' : ''}</span>`
                    : escapeHtml(p.title || '（无标题）');
                const checked = selectedIds.has(String(p.id)) ? 'checked' : '';
                return `
                <div class="post-row px-5 md:px-6 py-5 flex flex-col md:flex-row md:items-center gap-3 md:gap-4 ${checked ? 'bg-stone-50/60' : ''}">
                    <div class="md:self-stretch md:flex md:items-start md:pt-1 shrink-0">
                        <input type="checkbox" data-id="${p.id}" ${checked}
                               class="post-checkbox w-3.5 h-3.5 accent-stone-900 cursor-pointer">
                    </div>
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2 mb-1.5">
                            ${typeBadge}
                            <span class="shrink-0 text-[10px] uppercase tracking-wider font-semibold text-stone-500 border border-stone-200 px-1.5 py-0.5 rounded-sm bg-stone-100/50">
                                ${escapeHtml(p.category || '未分类')}
                            </span>
                            <h3 class="font-serif text-base text-stone-900 truncate">${titleDisplay}</h3>
                        </div>
                        <p class="text-[11px] text-stone-400 font-mono tracking-wide">
                            /${escapeHtml(p.slug)}
                            <span class="mx-1.5 text-stone-300">·</span>
                            ${formatDate(p.created_at)}
                            <span class="mx-1.5 text-stone-300">·</span>
                            ${p.views || 0} 次阅读
                        </p>
                    </div>
                    <div class="flex items-center gap-1 shrink-0 md:opacity-70 md:hover:opacity-100 transition-opacity">
                        <a href="/post/${encodeURIComponent(p.slug)}" target="_blank"
                           class="action-btn px-2.5 py-1.5 text-xs text-stone-500 hover:text-stone-900 hover:bg-stone-100 rounded">
                            查看
                        </a>
                        <a href="admin-edit.html?id=${p.id}" target="admin-frame"
                           class="action-btn px-2.5 py-1.5 text-xs text-stone-500 hover:text-stone-900 hover:bg-stone-100 rounded">
                            编辑
                        </a>
                        <button data-id="${p.id}" data-title="${escapeHtml(p.title || p.slug || '该项')}"
                                class="action-btn px-2.5 py-1.5 text-xs text-red-400 hover:text-red-600 hover:bg-red-50 rounded cursor-pointer delete-btn">
                            删除
                        </button>
                    </div>
                </div>
            `;
            }).join('');

            // 绑定删除（单删走老接口 id）
            listEl.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deletePost(btn.dataset.id, btn.dataset.title));
            });

            // 绑定单行复选框
            listEl.querySelectorAll('.post-checkbox').forEach(cb => {
                cb.addEventListener('change', () => {
                    if (cb.checked) selectedIds.add(cb.dataset.id);
                    else selectedIds.delete(cb.dataset.id);
                    syncBatchBar();
                    // 行底色反馈
                    const row = cb.closest('.post-row');
                    if (row) row.classList.toggle('bg-stone-50/60', cb.checked);
                    syncSelectAllState();
                });
            });

            // 绑定全选/反选
            const selectAll = listEl.querySelector('#select-all');
            if (selectAll) {
                selectAll.addEventListener('change', () => {
                    const visibleIds = posts.map(p => String(p.id));
                    if (selectAll.checked) {
                        visibleIds.forEach(id => selectedIds.add(id));
                    } else {
                        visibleIds.forEach(id => selectedIds.delete(id));
                    }
                    // 重新渲染一次让复选框 + 行底色同步（仅在当前视图内）
                    renderPosts();
                    // 全选/反选是一次性动作，需要主动刷新批量条
                    syncBatchBar();
                });
            }
            syncSelectAllState();
            // 渲染时也兜底刷一次批量条，避免过滤/搜索切换后条子状态错位
            syncBatchBar();
        }

        function syncSelectAllState() {
            const selectAll = document.getElementById('select-all');
            if (!selectAll) return;
            const visibleCheckboxes = document.querySelectorAll('.post-checkbox');
            if (visibleCheckboxes.length === 0) { selectAll.checked = false; return; }
            const checkedCount = [...visibleCheckboxes].filter(c => c.checked).length;
            selectAll.checked = checkedCount === visibleCheckboxes.length;
            selectAll.indeterminate = checkedCount > 0 && checkedCount < visibleCheckboxes.length;
        }

        function syncBatchBar() {
            const bar = document.getElementById('batch-bar');
            const countEl = document.getElementById('selected-count');
            const n = selectedIds.size;
            countEl.textContent = n;
            bar.classList.toggle('hidden', n === 0);
        }

        async function deletePost(id, title) {
            if (!confirm(`确定删除「${title}」？此操作不可恢复。`)) return;

            const token = getToken();
            try {
                const res = await fetch('/api/delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ id: Number(id) })
                });
                const result = await res.json();

                if (result.success) {
                    allPosts = allPosts.filter(p => String(p.id) !== String(id));
                    selectedIds.delete(String(id));
                    document.getElementById('total-count').textContent = allPosts.length;
                    renderPosts();
                    syncBatchBar();
                } else {
                    alert('删除失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                alert('请求失败，请检查网络');
            }
        }

        // ⚡ 批量删除：把当前选中的 id 一次性发给后端
        async function batchDelete() {
            if (selectedIds.size === 0) return;
            if (!confirm(`确定要删除选中的 ${selectedIds.size} 篇文章？此操作不可恢复。`)) return;

            const token = getToken();
            const ids = [...selectedIds].map(v => Number(v)).filter(n => Number.isFinite(n) && n > 0);
            if (ids.length === 0) {
                alert('所选 id 无效');
                return;
            }

            const btn = document.getElementById('batch-delete');
            if (btn) { btn.disabled = true; btn.classList.add('opacity-60', 'cursor-not-allowed'); }

            try {
                const res = await fetch('/api/delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ ids })
                });
                const result = await res.json();

                if (result.success) {
                    const removed = ids.map(String);
                    allPosts = allPosts.filter(p => !removed.includes(String(p.id)));
                    selectedIds.clear();
                    document.getElementById('total-count').textContent = allPosts.length;
                    renderPosts();
                    syncBatchBar();
                } else {
                    alert('批量删除失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                alert('请求失败，请检查网络');
            } finally {
                if (btn) { btn.disabled = false; btn.classList.remove('opacity-60', 'cursor-not-allowed'); }
            }
        }

        document.getElementById('search').addEventListener('input', renderPosts);
        document.getElementById('filter-category').addEventListener('change', renderPosts);
        document.getElementById('filter-type').addEventListener('change', renderPosts);

        document.getElementById('batch-cancel').addEventListener('click', () => {
            selectedIds.clear();
            renderPosts();
            syncBatchBar();
        });
        document.getElementById('batch-delete').addEventListener('click', batchDelete);

        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>
</html>
