<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>发布控制台</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* 页面滚动优化 */
body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #1e1e1e;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 20px 0;
    box-sizing: border-box;
}

/* 主容器 */
.container {
    width: 90%;
    max-width: 600px;
    padding: 30px;
    background: #2d2d2d;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    display: flex;
    flex-direction: column;
    height: fit-content; 
    margin: auto 0;
}

/* 头部 */
.header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    border-bottom: 1px solid #444;
    padding-bottom: 15px;
}
h2 { margin: 0; font-weight: 300; letter-spacing: 1px; color: #fff; font-size: 24px; }

/* Debug 按钮 */
.btn-debug {
    background: #4a5568;
    color: #a0aec0;
    border: 1px solid #2d3748;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
}
.btn-debug:hover { background: #718096; color: #fff; }

/* 诊断信息面板 */
.debug-info {
    background: #1a202c;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    border-left: 4px solid #4299e1;
    display: none; 
}
.debug-info h4 { margin: 0 0 10px 0; color: #90cdf4; border-bottom: 1px solid #2d3748; padding-bottom: 5px; }
.debug-info .item { margin-bottom: 5px; padding: 4px; border-radius: 3px; background: #2d3748; }
.debug-info .ok { color: #48bb78; }
.debug-info .err { color: #f56565; font-weight: bold; }
.debug-info .warn { color: #ed8936; }

/* 按钮组 */
.btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-shrink: 0; flex-wrap: wrap; }
.btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; color: #fff; transition: transform .1s; white-space: nowrap; }
.btn:active { transform: scale(0.98); }
.g { background: #3b82f6; } .p { background: #10b981; } .a { background: #f59e0b; color: #000; }

/* 日志显示框 */
.iframe-box {
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #444;
    height: 400px;
    display: flex;
    flex-direction: column;
}
.console-header { background: #111; padding: 5px 10px; font-size: 12px; color: #666; border-bottom: 1px solid #333; }
iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>

<div class="container">
  <div class="header-row">
      <h2>🚀 博客发布</h2>
        </div>

  <div id="debug-panel">
        </div>

  <div class="btn-group">
    <button class="btn g" onclick="run('generate')">🕷️ 生成静态</button>
    <button class="btn p" onclick="run('push')">🐙 推送 Git</button>
    <button class="btn a" onclick="run('run')">⚡ 一键发布</button>
  </div>
  
  <div class="iframe-box">
    <div class="console-header">EXECUTION LOG</div>
    <iframe id="log-frame" name="log-frame" src="about:blank"></iframe>
  </div>
</div>

<script>
// 全局定时器变量
let scrollTimer = null;

function toggleDebug() {
    const panel = document.getElementById('debug-panel').querySelector('.debug-info');
    if (panel) {
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }
}

function run(action) {
    const iframe = document.getElementById('log-frame');
    
    // 1. 清除旧的定时器 (如果有)
    if (scrollTimer) clearInterval(scrollTimer);

    // 2. 重置提示
    iframe.contentDocument.body.innerHTML = '<div style="color:#666;font-family:monospace;padding:20px">⏳ 正在请求任务...</div>';
    
    // 3. 加载新任务
    iframe.src = '?action=' + action;

    // 4. 启动强力滚屏定时器 (父页面控制子页面)
    // 每 100 毫秒强制把 iframe 滚动条拉到底
    scrollTimer = setInterval(() => {
        if (iframe.contentWindow && iframe.contentWindow.document) {
            // 尝试滚动 body 和 documentElement，兼容不同浏览器
            const doc = iframe.contentWindow.document;
            const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
            iframe.contentWindow.scrollTo(0, h);
        }
    }, 100);

    // 5. 监听任务结束
    // 当 iframe 加载完成(流式连接关闭)时，停止自动滚动
    iframe.onload = function() {
        console.log("任务完成，停止滚屏");
        if (scrollTimer) clearInterval(scrollTimer);
        
        // 最后再滚一次，确保万无一失
        if (iframe.contentWindow && iframe.contentWindow.document) {
             const doc = iframe.contentWindow.document;
             const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
             iframe.contentWindow.scrollTo(0, h);
        }
    };
}

// 初始化 iframe 样式
document.getElementById('log-frame').onload = function() {
    if(this.contentWindow.location.href === 'about:blank') {
        this.contentDocument.body.style.margin = "0";
        this.contentDocument.body.style.background = "#000";
        this.contentDocument.body.innerHTML = '<div style="color:#444;font-family:monospace;padding:20px;text-align:center;margin-top:100px">等待指令...</div>';
    }
}
</script>
</body>
</html>
