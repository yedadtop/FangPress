<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --font-serif: serif;
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body { font-family: var(--font-sans); }
        .font-serif { font-family: var(--font-serif); }

        /* 侧边栏导航项 */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            color: #57534e;
            border-radius: 0.5rem;
            transition: background-color .2s ease, color .2s ease;
            text-decoration: none;
            border: 0;
            background: transparent;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }
        .nav-item:hover {
            background: #fafaf9;
            color: #0c0a09;
        }
        .nav-item.active {
            background: #f5f5f4;
            color: #0c0a09;
            font-weight: 500;
        }
        .nav-item svg {
            width: 1rem;
            height: 1rem;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .nav-item.active svg { opacity: 1; }

        /* 移动端菜单按钮 */
        .menu-toggle { display: none; }
        @media (max-width: 767px) {
            .menu-toggle { display: inline-flex; }
        }

        /* 移动端侧边栏悬浮覆盖 */
        @media (max-width: 767px) {
            #sidebar {
                display: flex;          /* 覆盖 .hidden，确保元素始终渲染以便做动画 */
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 9999;
                box-shadow: 4px 0 20px rgba(0,0,0,0.1);
                transform: translateX(-100%);
                visibility: hidden;
                transition: transform 0.3s ease, visibility 0.3s;
            }
            #sidebar.open {
                transform: translateX(0);
                visibility: visible;
            }
            #sidebar-backdrop {
                visibility: hidden;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.3);
                z-index: 9998;
                opacity: 0;
                transition: opacity 0.3s ease, visibility 0.3s;
                pointer-events: none;
            }
            #sidebar-backdrop.show {
                visibility: visible;
                opacity: 1;
                pointer-events: auto;
            }
        }
    </style>
</head>
<body class="bg-[#fafaf9] text-stone-800 min-h-screen">

    <!-- ========================== 登录面板 ========================== -->
    <div id="auth-panel" class="hidden max-w-sm mx-auto mt-12 bg-white p-8 rounded-2xl border border-stone-200/60 shadow-xs">
        <h2 id="auth-title" class="font-serif text-2xl font-medium text-stone-900 mb-6 text-center">登录到 <span id="auth-site-title">…</span></h2>

        <div class="space-y-4">
            <div>
                <label class="block text-xs uppercase tracking-wider text-stone-400 mb-1">账号</label>
                <input type="text" id="username" autocomplete="username"
                       class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-md text-sm focus:outline-none focus:border-stone-400">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider text-stone-400 mb-1">密码</label>
                <input type="password" id="password" autocomplete="current-password"
                       class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-md text-sm focus:outline-none focus:border-stone-400">
            </div>
            <button id="auth-btn" onclick="handleAuth()" class="w-full mt-2 py-2 bg-stone-900 hover:bg-stone-800 text-white rounded-md text-sm font-medium transition-colors cursor-pointer">
                登录
            </button>
        </div>
    </div>

    <!-- ========================== 后台主面板：侧边栏 + 内容区 ========================== -->
    <div id="admin-panel" class="hidden min-h-screen flex flex-col md:flex-row">

        <!-- 移动端顶栏 -->
        <div class="md:hidden flex items-center justify-between px-5 py-3 bg-white border-b border-stone-200">
            <a href="/" class="font-serif text-base font-medium text-stone-900 hover:text-stone-600 transition-colors">
                <span id="site-title-mobile">…</span>
            </a>
            <button onclick="toggleMobileSidebar()" class="menu-toggle items-center gap-1.5 px-3 py-1.5 text-xs text-stone-500 border border-stone-200 rounded-md cursor-pointer">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
                菜单
            </button>
        </div>

        <!-- 移动端遮罩层 -->
        <div id="sidebar-backdrop" onclick="toggleMobileSidebar()"></div>

        <!-- 侧边栏 -->
        <aside id="sidebar" class="md:w-60 md:min-h-screen md:border-r md:border-stone-200 md:bg-white bg-white border-b md:border-b-0 border-stone-200 shrink-0 hidden md:flex flex-col">
            <div class="px-6 py-7 border-b border-stone-200/60">
                <a href="/" target="_blank" class="block">
                    <p id="site-title-sidebar" class="font-serif text-lg font-medium text-stone-900 hover:text-stone-600 transition-colors"></p>
                    <p id="admin-console-label" class="text-[10px] uppercase tracking-widest text-stone-400 mt-1 hidden">Admin Console</p>
                </a>
            </div>

            <nav class="flex-1 px-3 py-6 space-y-1">
                <a href="admin-overview.html" target="admin-frame" data-page="overview" class="nav-item active">
                    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
                    </svg>
                    概览
                </a>
                <a href="admin-edit.html" target="admin-frame" data-page="edit" class="nav-item">
                    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                    </svg>
                    撰写新文
                </a>
                <a href="admin-posts.html" target="admin-frame" data-page="posts" class="nav-item">
                    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                    </svg>
                    文章管理
                </a>
                <a href="admin-settings.html" target="admin-frame" data-page="settings" class="nav-item">
                    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    系统设置
                </a>
                <a href="admin-navs.html" target="admin-frame" data-page="navs" class="nav-item">
                    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9h16.5m-16.5 6.75h16.5" />
                    </svg>
                    导航管理
                </a>
                <a href="admin-users.html" target="admin-frame" data-page="users" class="nav-item">
                    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                    用户管理
                </a>
                <a href="admin-database.html" target="admin-frame" data-page="database" class="nav-item">
                    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
                    </svg>
                    数据库管理
                </a>
            </nav>

            <div class="px-3 py-4 border-t border-stone-200/60 space-y-1">
                <div class="px-3 py-2">
                    <p class="text-[10px] uppercase tracking-widest text-stone-400">已登录</p>
                    <p id="admin-name" class="text-sm text-stone-700 font-medium mt-0.5 truncate">—</p>
                </div>
                <a href="/" target="_blank" class="nav-item text-stone-500">
                    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                    </svg>
                    查看站点
                </a>
                <button onclick="logout()" class="nav-item text-stone-500">
                    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
                    </svg>
                    退出登录
                </button>
            </div>
        </aside>

        <!-- 内容区 -->
        <main class="flex-1 min-w-0 bg-[#fafaf9]">
            <iframe id="admin-frame" name="admin-frame"
                    class="w-full h-screen min-h-[600px] border-0 block bg-[#fafaf9]"></iframe>
        </main>

    </div>

    <script>
        // -------- 网站设置 --------
        const DEFAULT_SITE_TITLE = "";

        async function loadSiteTitle() {
            try {
                const res = await fetch('/api/settings');
                const result = await res.json();
                const title = (result && result.success && result.data && result.data.site_title)
                    || DEFAULT_SITE_TITLE;
                // 登录面板标题
                const authEl = document.getElementById('auth-site-title');
                if (authEl) authEl.textContent = title;
                // 移动端顶栏
                const mobileEl = document.getElementById('site-title-mobile');
                if (mobileEl) mobileEl.textContent = title;
                // 侧边栏
                const sidebarEl = document.getElementById('site-title-sidebar');
                if (sidebarEl) sidebarEl.textContent = title;
                // 显示 Admin Console 标签
                const adminLabel = document.getElementById('admin-console-label');
                if (adminLabel) adminLabel.classList.remove('hidden');
            } catch (e) {
                const authEl = document.getElementById('auth-site-title');
                if (authEl) authEl.textContent = DEFAULT_SITE_TITLE;
                // 即使加载失败也显示 Admin Console 标签
                const adminLabel = document.getElementById('admin-console-label');
                if (adminLabel) adminLabel.classList.remove('hidden');
            }
        }

        // -------- 鉴权 --------
        function checkSystemState() {
            const token = localStorage.getItem('admin_token');
            const nickname = localStorage.getItem('admin_nickname');

            if (token) {
                showAdminPanel(nickname);
                return;
            }
            // 直接展示登录面板（默认账号 admin / admin）
            document.getElementById('auth-panel').classList.remove('hidden');
        }

        async function handleAuth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const result = await res.json();

                if (result.success) {
                    localStorage.setItem('admin_token', result.token);
                    localStorage.setItem('admin_nickname', result.nickname);
                    showAdminPanel(result.nickname);
                } else {
                    alert('失败: ' + result.error);
                }
            } catch (err) {
                alert('网络发生异常');
            }
        }

        function showAdminPanel(nickname) {
            document.getElementById('auth-panel').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('admin-name').textContent = nickname || 'Admin';

            // 登录成功才挂载 iframe 内容，避免未登录时子页面反复重定向
            const frame = document.getElementById('admin-frame');
            if (frame && !frame.src) {
                frame.src = 'admin-overview.html';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // -------- 移动端侧栏开关 --------
        function toggleMobileSidebar() {
            const sb = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            sb.classList.toggle('open');
            backdrop.classList.toggle('show');
        }

        function closeMobileSidebar() {
            const sb = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            sb.classList.remove('open');
            backdrop.classList.remove('show');
        }

        // -------- 全屏编辑模式：隐藏/显示侧边栏 --------
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type) {
                const sidebar = document.getElementById('sidebar');
                const frame = document.getElementById('admin-frame');
                if (e.data.type === 'hide-sidebar') {
                    if (sidebar && !sidebar.classList.contains('hidden')) {
                        sidebar.classList.add('hidden');
                        sidebar.classList.remove('flex');
                    }
                    // 让 iframe 覆盖整个屏幕
                    if (frame) {
                        frame.style.position = 'fixed';
                        frame.style.top = '0';
                        frame.style.left = '0';
                        frame.style.width = '100vw';
                        frame.style.height = '100vh';
                        frame.style.zIndex = '9999';
                    }
                } else if (e.data.type === 'exit-fullscreen') {
                    // 恢复侧边栏
                    if (sidebar) {
                        sidebar.classList.remove('hidden');
                        sidebar.classList.add('flex');
                    }
                    // 恢复 iframe 正常布局
                    if (frame) {
                        frame.style.position = '';
                        frame.style.top = '';
                        frame.style.left = '';
                        frame.style.width = '';
                        frame.style.height = '';
                        frame.style.zIndex = '';
                    }
                }
            }
        });

        // -------- 监听 iframe 切换，更新侧栏高亮 --------
        function syncActiveNav() {
            const frame = document.getElementById('admin-frame');
            try {
                const path = frame.contentWindow.location.pathname.split('/').pop();
                const pageMap = {
                    'admin-overview.html': 'overview',
                    'admin-edit.html': 'edit',
                    'admin-posts.html': 'posts',
                    'admin-settings.html': 'settings',
                    'admin-navs.html': 'navs',
                    'admin-users.html': 'users',
                    'admin-database.html': 'database'
                };
                const activePage = pageMap[path];
                if (!activePage) return;
                document.querySelectorAll('.nav-item[data-page]').forEach(el => {
                    el.classList.toggle('active', el.dataset.page === activePage);
                });
            } catch (e) { /* 跨域时忽略 */ }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSiteTitle();
            checkSystemState();

            // 移动端导航点击关闭侧边栏并同步高亮（只绑定一次）
            document.querySelectorAll('.nav-item[data-page]').forEach(el => {
                el.addEventListener('click', () => {
                    closeMobileSidebar();
                    document.querySelectorAll('.nav-item[data-page]').forEach(nav => nav.classList.remove('active'));
                    el.classList.add('active');
                });
            });

            const frame = document.getElementById('admin-frame');
            frame.addEventListener('load', syncActiveNav);
        });
    </script>
</body>
</html>
