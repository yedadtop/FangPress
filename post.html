<!--
    页面：文章详情页（Post Detail）
    作用：根据 URL 中的 slug 渲染单篇文章的标题、分类、阅读量、发布时间与正文
    数据：SSR 注入到 #ssr-post-article（标题、分类、阅读量、时间、正文）
    状态：#status-loading 加载中 / #status-bad-slug 缺 slug / #status-not-found 不存在 / #status-error 失败
    说明：当前实现下，type=post 与 type=tweet 共用同一详情页骨架（/post/{slug}），
          推文详情亦复用此模板。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="" data-ssr="meta-description">
    <meta property="og:title" content="" data-ssr="og-title">
    <meta property="og:description" content="" data-ssr="og-description">
    <meta property="og:type" content="article">
    <title data-ssr="post-title"></title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preload" href="/tailwind.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/tailwind.css"></noscript>
    <style>
        /* === 详情页独有:文章正文排版系统(由 marked 输出的 HTML 通过 .prose-reader 套上样式) === */
        .prose-reader { font-family: var(--reader-body-font); color: var(--reader-text); font-size: 1.2rem; line-height: 1.85; letter-spacing: var(--reader-letter-spacing); }
        .prose-reader h1, .prose-reader h2, .prose-reader h3, .prose-reader h4 { font-family: var(--reader-title-font); font-weight: var(--reader-title-weight); color: hsl(24, 10%, 0%); letter-spacing: -0.01em; line-height: 1.3; }
        .prose-reader h1 { font-size: 1.8em; margin: 2.5rem 0 1.2rem; }
        .prose-reader h2 { font-size: 1.45em; margin: 2.2rem 0 1rem; }
        .prose-reader h3 { font-size: 1.2em;  margin: 1.8rem 0 0.8rem; }
        .prose-reader h4 { font-size: 1.05em; margin: 1.5rem 0 0.5rem; }
        .prose-reader p { margin-top: 0; margin-bottom: 1.4em; }
        @media (max-width: 767px) {
            .prose-reader p { text-align: justify; text-justify: inter-ideograph; }
        }
        .prose-reader a { color: #44403c; border-bottom: 1px solid #d6d3d1; transition: border-color 0.2s, color 0.2s; }
        .prose-reader a:hover { color: #0c0a09; border-bottom-color: #0c0a09; }
        .prose-reader strong { color: #000000; font-weight: var(--reader-title-weight); }
        .prose-reader em { font-style: italic; opacity: 0.95; }
        .prose-reader blockquote { border-left: 3px solid #d6d3d1; padding-left: 1.5rem; margin: 1.8rem 0; color: hsl(24, 10%, 30%); font-style: italic; }
        .prose-reader code { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 0.88em; background: rgba(0, 0, 0, 0.04); padding: 0.15em 0.4em; border-radius: 4px; }
        .prose-reader pre { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 0.85em; line-height: 1.6; background: rgba(0, 0, 0, 0.03); padding: 1.2rem 1.5rem; border-radius: 8px; overflow-x: auto; margin: 1.8rem 0; }
        .prose-reader pre code { background: transparent; padding: 0; font-size: inherit; }
        .prose-reader ul, .prose-reader ol { padding-left: 1.5rem; margin-bottom: 1.4em; }
        .prose-reader ul { list-style: disc; }
        .prose-reader ol { list-style: decimal; }
        .prose-reader li { margin: 0.5em 0; }
        .prose-reader hr { border: 0; text-align: center; margin: 3rem 0; color: #d6d3d1; }
        .prose-reader hr::before { content: '···'; letter-spacing: 1em; }
        .prose-reader img {
            max-width: 50%;
            max-height: 30rem;
            border-radius: 6px;
            margin: 1.8rem auto;
            display: block;
            cursor: zoom-in;
            -webkit-user-drag: none;
            user-select: none;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        /* 公共排版（:root 变量、滚动条、link-underline、fade 动画、tweet-img）已挪到 /tailwind.css */
    </style>
</head>
<body class="min-h-screen selection:bg-stone-200">

    <div class="max-w-[49rem] mx-auto px-6 pt-12 pb-20">

        <article id="ssr-post-article" data-ssr="post-article" class="hidden">
            <header id="ssr-post-header" class="mb-10 pb-8 border-b border-stone-200/70">
                <h1 id="ssr-post-title" data-ssr="post-title" style="font-family: var(--reader-title-font); font-weight: var(--reader-title-weight);" class="text-3xl md:text-[2.5rem] tracking-tight leading-tight text-stone-900">
                </h1>
                <div class="flex items-center gap-3 mt-5 text-xs text-stone-400 tracking-widest uppercase font-sans">
                    <span id="ssr-post-type-badge" data-ssr="post-type-badge" class="hidden"></span>
                    <span id="ssr-post-category" data-ssr="post-category" class="font-semibold text-stone-500 bg-stone-200/60 px-1.5 py-0.5 rounded-xs"></span>
                    <span id="ssr-post-category-sep" data-ssr="post-category-sep">·</span>
                    <span id="ssr-post-views-group" data-ssr="post-views-group" class="contents">
                        <span id="ssr-post-views" data-ssr="post-views" class="flex items-center gap-1 lowercase normal-case tracking-normal"></span>
                        <span>·</span>
                    </span>
                    <time id="ssr-post-time" data-ssr="post-time" class="tabular-nums tracking-wider"></time>
                </div>
            </header>

            <div id="ssr-post-content" data-ssr="post-content" class="prose-reader">
            </div>
        </article>

        <div id="status-loading" class="hidden py-24 text-center fade-in">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic tracking-widest">加载中...</p>
        </div>

        <div id="status-bad-slug" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p style="font-family: var(--reader-title-font);" class="text-stone-500 text-base italic">缺少文章标识</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider font-sans">URL 中未提供 slug 参数</p>
        </div>
        <div id="status-not-found" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p style="font-family: var(--reader-title-font);" class="text-stone-500 text-base italic">这篇文章不存在</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider font-sans">它可能已被删除,或链接有误</p>
        </div>
        <div id="status-error" class="hidden py-24 text-stone-400 text-sm tracking-wider">
            <span style="font-family: var(--reader-title-font);" class="italic">内容加载失败</span> · 请刷新重试
        </div>
    </div>

    <footer class="max-w-[49rem] mx-auto px-6 pb-12 text-center text-stone-400 text-xs tracking-widest uppercase font-sans">
        — End of Post —
    </footer>

    <script src="/fancybox-loader.js" defer></script>
    <script src="/verify-optimize.js" defer></script>
</body>
</html>
