<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="" data-ssr="meta-description">
    <meta property="og:title" content="" data-ssr="og-title">
    <meta property="og:description" content="" data-ssr="og-description">
    <meta property="og:type" content="article">
    <title data-ssr="post-title"></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            /* === 基于调试面板锁定的核心视觉变量 === */
            --reader-bg: hsl(40, 23%, 95%);           /* 纸张背景明度 95% */
            --reader-text: hsl(24, 10%, 10%);         /* 墨质字色暗度 10% */
            --reader-size: 1.2rem;                    /* 正文字号 1.2rem */
            --reader-line-height: 1.80;               /* 呼吸行高 1.80 */
            --reader-width: 50rem;                    /* 容器黄金行宽 50rem */
            --reader-paragraph-spacing: 1.40em;       /* 段落底部间距 */
            --reader-letter-spacing: 0.02em;          /* 字间距微调 */
            --reader-title-weight: 700;               /* 标题加粗字重 */

            /* 字体栈 */
            --font-serif-stack: "Noto Serif SC", "Source Han Serif CN", "SimSun", "Georgia", serif;
            --font-sans-stack: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;

            /* 字体映射 */
            --reader-title-font: var(--font-serif-stack);
            --reader-body-font: var(--font-serif-stack);
        }

        body { 
            font-family: var(--reader-body-font); 
            background-color: var(--reader-bg);
            color: var(--reader-text);
            letter-spacing: var(--reader-letter-spacing);
        }
        
        .font-sans { font-family: var(--font-sans-stack); }

        /* === 阅读区排版系统 === */
        .prose-reader {
            font-family: var(--reader-body-font);
            color: var(--reader-text);
            font-size: var(--reader-size);
            line-height: var(--reader-line-height);
            letter-spacing: var(--reader-letter-spacing);
        }
        .prose-reader h1,
        .prose-reader h2,
        .prose-reader h3,
        .prose-reader h4 {
            font-family: var(--reader-title-font);
            font-weight: var(--reader-title-weight);
            color: hsl(24, 10%, 5%); /* 标题比正文更黑一点以提升层级 */
            letter-spacing: -0.01em;
            line-height: 1.3;
        }
        .prose-reader h1 { font-size: 1.8em; margin: 2.5rem 0 1.2rem; }
        .prose-reader h2 { font-size: 1.45em; margin: 2.2rem 0 1rem; }
        .prose-reader h3 { font-size: 1.2em;  margin: 1.8rem 0 0.8rem; }
        .prose-reader h4 { font-size: 1.05em; margin: 1.5rem 0 0.5rem; }
        
        .prose-reader p { 
            margin-top: 0;
            margin-bottom: var(--reader-paragraph-spacing); 
        }

        .prose-reader a {
            color: #44403c;
            border-bottom: 1px solid #d6d3d1;
            transition: border-color 0.2s, color 0.2s;
        }
        .prose-reader a:hover { color: #0c0a09; border-bottom-color: #0c0a09; }
        .prose-reader strong { color: #0c0a09; font-weight: var(--reader-title-weight); }
        .prose-reader em { font-style: italic; opacity: 0.95; }
        
        .prose-reader blockquote {
            border-left: 3px solid #d6d3d1;
            padding-left: 1.5rem;
            margin: 1.8rem 0;
            color: hsl(24, 10%, 35%);
            font-style: italic;
        }
        
        .prose-reader code {
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.88em;
            background: rgba(0, 0, 0, 0.04);
            padding: 0.15em 0.4em;
            border-radius: 4px;
        }
        .prose-reader pre {
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.85em;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.03);
            padding: 1.2rem 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.8rem 0;
        }
        .prose-reader pre code {
            background: transparent;
            padding: 0;
            font-size: inherit;
        }
        
        .prose-reader ul,
        .prose-reader ol {
            padding-left: 1.5rem;
            margin-bottom: var(--reader-paragraph-spacing);
        }
        .prose-reader ul { list-style: disc; }
        .prose-reader ol { list-style: decimal; }
        .prose-reader li { margin: 0.5em 0; }
        
        .prose-reader hr {
            border: 0;
            text-align: center;
            margin: 3rem 0;
            color: #d6d3d1;
        }
        .prose-reader hr::before {
            content: '···';
            letter-spacing: 1em;
        }
        
        .prose-reader img {
            max-width: 100%;
            border-radius: 6px;
            margin: 1.8rem 0;
        }
    </style>
</head>
<body class="min-h-screen selection:bg-stone-200">

    <div class="max-w-[44rem] mx-auto px-6 pt-6 md:pt-8 pb-20">

        <article id="ssr-post-article" data-ssr="post-article" class="hidden">
            <header class="mb-10 pb-8 border-b border-stone-200/70">
                <h1 id="ssr-post-title" data-ssr="post-title" style="font-family: var(--reader-title-font); font-weight: var(--reader-title-weight);" class="text-3xl md:text-[2.5rem] tracking-tight leading-tight text-stone-900">
                </h1>
                <div class="flex items-center gap-4 mt-5 text-xs text-stone-400 tracking-widest uppercase font-sans">
                    <span id="ssr-post-category" data-ssr="post-category" class="font-semibold text-stone-500 bg-stone-200/60 px-1.5 py-0.5 rounded-xs"></span>
                    <span id="ssr-post-category-sep" data-ssr="post-category-sep">·</span>
                    <span id="ssr-post-views-group" data-ssr="post-views-group" class="contents">
                        <span id="ssr-post-views" data-ssr="post-views" class="flex items-center gap-1 lowercase normal-case tracking-normal"></span>
                        <span>·</span>
                    </span>
                    <time id="ssr-post-time" data-ssr="post-time" class="tabular-nums tracking-wider"></time>
                </div>
            </header>

            <div id="ssr-post-content" data-ssr="post-content" class="prose-reader">
            </div>
        </article>

        <div id="post-skeleton" class="mt-12">
            <div class="mb-10 pb-8 border-b border-stone-200/70">
                <div class="h-9 md:h-11 bg-stone-200/80 rounded w-4/5 mb-3"></div>
                <div class="h-9 md:h-11 bg-stone-200/80 rounded w-1/2"></div>
                <div class="flex items-center gap-4 mt-5">
                    <div class="h-5 w-20 bg-stone-200/80 rounded"></div>
                    <div class="h-3 w-24 bg-stone-200/80 rounded"></div>
                    <div class="h-3 w-24 bg-stone-200/80 rounded"></div>
                </div>
            </div>
            <div class="space-y-4">
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-11/12"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-3/4"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-2/3"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-5/6"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-1/2"></div>
            </div>
        </div>

        <div id="status-loading" class="hidden"></div>
        <div id="status-bad-slug" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p style="font-family: var(--reader-title-font);" class="text-stone-500 text-base italic">缺少文章标识</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider font-sans">URL 中未提供 slug 参数</p>
        </div>
        <div id="status-not-found" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p style="font-family: var(--reader-title-font);" class="text-stone-500 text-base italic">这篇文章不存在</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider font-sans">它可能已被删除,或链接有误</p>
        </div>
        <div id="status-error" class="hidden py-24 text-stone-400 text-sm tracking-wider">
            <span style="font-family: var(--reader-title-font);" class="italic">内容加载失败</span> · 请刷新重试
        </div>
    </div>

    <footer class="max-w-[44rem] mx-auto px-6 pb-12 text-center text-stone-400 text-xs tracking-widest uppercase font-sans">
        — End of Post —
    </footer>

</body>
</html>
