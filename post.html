<body class="bg-[#fafaf9] text-stone-800 min-h-screen selection:bg-stone-200">

    <div class="max-w-2xl mx-auto px-6 pt-10 md:pt-14 pb-20">

        <a href="/" class="back-btn inline-flex items-center gap-2 text-sm text-stone-500 hover:text-stone-900 transition-colors tracking-wider">
            <span class="arrow">←</span>
            <span>返回主页</span>
        </a>

        <article id="post-article" class="mt-12 hidden">
            <header class="mb-10 pb-8 border-b border-stone-200/70">
                <h1 id="post-title" class="font-serif text-3xl md:text-[2.5rem] font-semibold tracking-tight leading-tight text-stone-900">
                </h1>
                <div class="flex items-center gap-4 mt-4 text-xs text-stone-400 tracking-widest uppercase">
                    <span id="post-category" class="font-semibold text-stone-500 bg-stone-200/60 px-1.5 py-0.5 rounded-xs"></span>
                    <span id="post-category-sep">·</span>
                    <span id="views-group" class="contents">
                        <span id="post-views" class="flex items-center gap-1 font-sans lowercase normal-case tracking-normal"></span>
                        <span>·</span>
                    </span>
                    <time id="post-time" class="tabular-nums font-sans tracking-wider"></time>
                </div>
            </header>

            <div id="post-content" class="prose-reader">
            </div>
        </article>

        <div id="post-skeleton" class="mt-12">
            <div class="mb-10 pb-8 border-b border-stone-200/70">
                <div class="h-9 md:h-11 bg-stone-200/80 rounded w-4/5 mb-3"></div>
                <div class="h-9 md:h-11 bg-stone-200/80 rounded w-1/2"></div>
                <div class="flex items-center gap-4 mt-5">
                    <div class="h-5 w-20 bg-stone-200/80 rounded"></div>
                    <div class="h-3 w-24 bg-stone-200/80 rounded"></div>
                    <div class="h-3 w-24 bg-stone-200/80 rounded"></div>
                </div>
            </div>
            <div class="space-y-4">
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-11/12"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-3/4"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-2/3"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-5/6"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-1/2"></div>
            </div>
        </div>

        <div id="status-loading" class="hidden">
        </div>

        <div id="status-bad-slug" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic">缺少文章标识</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider">URL 中未提供 slug 参数</p>
        </div>

        <div id="status-not-found" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic">这篇文章不存在</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider">它可能已被删除,或链接有误</p>
        </div>

        <div id="status-error" class="hidden py-24 text-stone-400 text-sm tracking-wider">
            <span class="font-serif italic">内容加载失败</span> · 请刷新重试
        </div>
    </div>

    <footer class="max-w-2xl mx-auto px-6 pb-12 text-center text-stone-400 text-xs tracking-widest uppercase">
        — End of Post —
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');

        const loadingEl       = document.getElementById('status-loading');
        const badSlugEl       = document.getElementById('status-bad-slug');
        const notFoundEl      = document.getElementById('status-not-found');
        const errorEl         = document.getElementById('status-error');
        const articleEl       = document.getElementById('post-article');
        const skeletonEl      = document.getElementById('post-skeleton');
        const titleEl         = document.getElementById('post-title');
        const categoryEl      = document.getElementById('post-category');
        const categorySepEl   = document.getElementById('post-category-sep');
        const viewsEl         = document.getElementById('post-views');
        const viewsGroupEl    = document.getElementById('views-group');
        const timeEl          = document.getElementById('post-time');
        const contentEl       = document.getElementById('post-content');

        const DEFAULT_SETTINGS = {
            site_title:    "",
            site_subtitle: "",
            show_views:    "1"
        };

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const result = await res.json();
                if (result.success && result.data) {
                    return Object.assign({}, DEFAULT_SETTINGS, result.data);
                }
            } catch (e) { /* 用默认值 */ }
            return Object.assign({}, DEFAULT_SETTINGS);
        }

        function showOnly(el) {
            [loadingEl, badSlugEl, notFoundEl, errorEl, articleEl, skeletonEl].forEach(node => {
                if (node) node.classList.add('hidden');
            });
            if (el) el.classList.remove('hidden');
        }

        function formatDate(ts) {
            const d = new Date(ts);
            if (isNaN(d)) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y} · ${m} · ${day}`;
        }

        async function loadPost() {
            // 缺 slug 直接走错误态
            if (!slug) {
                const settings = await loadSettings();
                document.title = settings.site_title || DEFAULT_SETTINGS.site_title;
                showOnly(badSlugEl);
                return;
            }

            try {
                // 设置与文章并行拉取
                const [settings, postRes] = await Promise.all([
                    loadSettings(),
                    fetch('/api/get?slug=' + encodeURIComponent(slug))
                ]);
                const settingsData = await postRes.json();
                const showViews = String(settings.show_views) === '1';

                if (postRes.status === 404) {
                    document.title = settings.site_title || DEFAULT_SETTINGS.site_title;
                    showOnly(notFoundEl);
                    return;
                }

                if (settingsData.success && settingsData.data) {
                    const post = settingsData.data;
                    const siteTitle = settings.site_title || DEFAULT_SETTINGS.site_title;
                    document.title = `${post.title || '未命名'} · ${siteTitle}`;

                    titleEl.textContent = post.title || '未命名';
                    // 后端已将空/默认值归一为 null，前端只判真值即可
                    if (post.category) {
                        categoryEl.textContent = post.category;
                    } else {
                        categoryEl.classList.add('hidden');
                        categorySepEl.classList.add('hidden');
                    }
                    timeEl.textContent  = formatDate(post.created_at);

                    if (showViews) {
                        viewsGroupEl.classList.remove('hidden');
                        viewsEl.innerHTML = `
                            <svg class="w-3.5 h-3.5 opacity-70" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <span>${post.views || 0} 次阅读</span>
                        `;
                    } else {
                        viewsGroupEl.classList.add('hidden');
                    }

                    if (window.marked) {
                        contentEl.innerHTML = window.marked.parse(post.content || '');
                    } else {
                        contentEl.textContent = post.content || '';
                    }

                    showOnly(articleEl);
                } else {
                    document.title = settings.site_title || DEFAULT_SETTINGS.site_title;
                    showOnly(notFoundEl);
                }
            } catch (err) {
                console.error(err);
                showOnly(errorEl);
            }
        }

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
