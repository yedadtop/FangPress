<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="" data-ssr="meta-description">
    <meta property="og:title" content="" data-ssr="og-title">
    <meta property="og:description" content="" data-ssr="og-description">
    <meta property="og:type" content="article">
    <title data-ssr="post-title"></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --font-serif: serif;
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        body { font-family: var(--font-sans); }
        .font-serif { font-family: var(--font-serif); }

        /* 阅读区排版 */
        .prose-reader {
            font-family: var(--font-serif);
            color: #292524;
            font-size: 1.125rem;
            line-height: 1.85;
            letter-spacing: 0.005em;
        }
        .prose-reader h1,
        .prose-reader h2,
        .prose-reader h3,
        .prose-reader h4 {
            font-family: var(--font-serif);
            font-weight: 600;
            color: #0c0a09;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }
        .prose-reader h1 { font-size: 1.75rem; margin: 2.25rem 0 1rem; }
        .prose-reader h2 { font-size: 1.45rem; margin: 2rem 0 0.875rem; }
        .prose-reader h3 { font-size: 1.2rem;  margin: 1.75rem 0 0.75rem; }
        .prose-reader p  { margin: 1.1rem 0; }
        .prose-reader a {
            color: #44403c;
            border-bottom: 1px solid #d6d3d1;
            transition: border-color 0.2s, color 0.2s;
        }
        .prose-reader a:hover { color: #0c0a09; border-bottom-color: #0c0a09; }
        .prose-reader strong { color: #0c0a09; font-weight: 600; }
        .prose-reader em { font-style: italic; }
        .prose-reader blockquote {
            border-left: 2px solid #d6d3d1;
            padding-left: 1.25rem;
            margin: 1.5rem 0;
            color: #57534e;
            font-style: italic;
        }
        .prose-reader code {
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.92em;
            background: #f5f5f4;
            padding: 0.15em 0.4em;
            border-radius: 4px;
            color: #44403c;
        }
        .prose-reader pre {
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            background: #f5f5f4;
            padding: 1.1rem 1.25rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 1.5rem 0;
        }
        .prose-reader pre code {
            background: transparent;
            padding: 0;
            font-size: inherit;
        }
        .prose-reader ul,
        .prose-reader ol {
            padding-left: 1.5rem;
            margin: 1.1rem 0;
        }
        .prose-reader ul { list-style: disc; }
        .prose-reader ol { list-style: decimal; }
        .prose-reader li { margin: 0.4rem 0; }
        .prose-reader hr {
            border: 0;
            text-align: center;
            margin: 2.5rem 0;
            color: #d6d3d1;
        }
        .prose-reader hr::before {
            content: '· · ·';
            letter-spacing: 0.5em;
        }
        .prose-reader img {
            max-width: 100%;
            border-radius: 6px;
            margin: 1.5rem 0;
        }

        /* 返回按钮箭头微动 */
        .back-btn .arrow {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .back-btn:hover .arrow { transform: translateX(-3px); }
    </style>
</head>
<body class="bg-[#fafaf9] text-stone-800 min-h-screen selection:bg-stone-200">

    <div class="max-w-2xl mx-auto px-6 pt-6 md:pt-8 pb-20">

        <article id="ssr-post-article" data-ssr="post-article" class="hidden">
            <header class="mb-10 pb-8 border-b border-stone-200/70">
                <h1 id="ssr-post-title" data-ssr="post-title" class="font-serif text-3xl md:text-[2.5rem] font-semibold tracking-tight leading-tight text-stone-900">
                </h1>
                <div class="flex items-center gap-4 mt-4 text-xs text-stone-400 tracking-widest uppercase">
                    <span id="ssr-post-category" data-ssr="post-category" class="font-semibold text-stone-500 bg-stone-200/60 px-1.5 py-0.5 rounded-xs"></span>
                    <span id="ssr-post-category-sep" data-ssr="post-category-sep">·</span>
                    <span id="ssr-post-views-group" data-ssr="post-views-group" class="contents">
                        <span id="ssr-post-views" data-ssr="post-views" class="flex items-center gap-1 font-sans lowercase normal-case tracking-normal"></span>
                        <span>·</span>
                    </span>
                    <time id="ssr-post-time" data-ssr="post-time" class="tabular-nums font-sans tracking-wider"></time>
                </div>
            </header>

            <div id="ssr-post-content" data-ssr="post-content" class="prose-reader">
            </div>
        </article>

        <div id="post-skeleton" class="mt-12">
            <div class="mb-10 pb-8 border-b border-stone-200/70">
                <div class="h-9 md:h-11 bg-stone-200/80 rounded w-4/5 mb-3"></div>
                <div class="h-9 md:h-11 bg-stone-200/80 rounded w-1/2"></div>
                <div class="flex items-center gap-4 mt-5">
                    <div class="h-5 w-20 bg-stone-200/80 rounded"></div>
                    <div class="h-3 w-24 bg-stone-200/80 rounded"></div>
                    <div class="h-3 w-24 bg-stone-200/80 rounded"></div>
                </div>
            </div>
            <div class="space-y-4">
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-11/12"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-3/4"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-2/3"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-5/6"></div>
                <div class="h-4 bg-stone-200/80 rounded w-full"></div>
                <div class="h-4 bg-stone-200/80 rounded w-1/2"></div>
            </div>
        </div>

        <div id="status-loading" class="hidden">
        </div>

        <div id="status-bad-slug" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic">缺少文章标识</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider">URL 中未提供 slug 参数</p>
        </div>

        <div id="status-not-found" class="hidden py-24 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic">这篇文章不存在</p>
            <p class="mt-2 text-stone-400 text-xs tracking-wider">它可能已被删除,或链接有误</p>
        </div>

        <div id="status-error" class="hidden py-24 text-stone-400 text-sm tracking-wider">
            <span class="font-serif italic">内容加载失败</span> · 请刷新重试
        </div>
    </div>

    <footer class="max-w-2xl mx-auto px-6 pb-12 text-center text-stone-400 text-xs tracking-widest uppercase">
        — End of Post —
    </footer>

    <!-- Edge SSR: 由 Cloudflare Worker (functions/[[path]].js) 在边缘完成数据注入。
         客户端不再发起 fetch；HTMLRewriter 将通过以下标识进行定位：
           - title / meta[name="description"]              页面标题与 SEO 描述
           - #ssr-post-title / #ssr-post-content            文章标题与正文
           - #ssr-post-time                                 发布时间
           - #ssr-post-category / #ssr-post-views           分类与阅读量
           - #status-bad-slug / #status-not-found / #status-error / #post-skeleton  降级态
    -->
</body>
</html>
