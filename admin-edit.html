<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>撰写新文 · 创作中心</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap');
        :root {
            --font-serif: 'Newsreader', 'Songti SC', 'STSong', serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body { font-family: var(--font-sans); }
        .font-serif { font-family: var(--font-serif); }

        .word-count { font-variant-numeric: tabular-nums; }

        /* 编辑器容器 */
        .editor-container {
            display: flex;
            flex-direction: column;
            border: 1px solid #d6d3d1;
            border-radius: 0.375rem;
            overflow: hidden;
            background: white;
        }
        @media (min-width: 768px) {
            .editor-container {
                flex-direction: row;
            }
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 8px;
            border-bottom: 1px solid #e7e5e4;
            background: #fafaf9;
        }
        @media (min-width: 768px) {
            .toolbar {
                flex-direction: column;
                border-bottom: none;
                border-right: 1px solid #e7e5e4;
                width: 44px;
            }
        }

        .toolbar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 4px;
            color: #78716c;
            cursor: pointer;
            transition: all .15s ease;
        }
        .toolbar-btn:hover {
            background: #e7e5e4;
            color: #1c1917;
        }
        .toolbar-btn:active {
            background: #d6d3d1;
        }

        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: #d6d3d1;
            margin: 0 4px;
            align-self: center;
        }
        @media (min-width: 768px) {
            .toolbar-divider {
                width: 20px;
                height: 1px;
                margin: 4px 0;
            }
        }

        /* 编辑区 */
        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a8a29e;
            border-bottom: 1px solid #e7e5e4;
            background: #fafaf9;
        }

        .editor-textarea {
            flex: 1;
            width: 100%;
            min-height: 400px;
            padding: 16px;
            border: none;
            resize: none;
            font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
            font-size: 14px;
            line-height: 1.7;
            color: #1c1917;
            background: white;
            outline: none;
        }

        /* 预览区 */
        .preview-pane {
            flex: 1;
            min-width: 0;
            border-top: 1px solid #e7e5e4;
            background: white;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) {
            .preview-pane {
                border-top: none;
                border-left: 1px solid #e7e5e4;
            }
        }

        .preview-content {
            flex: 1;
            padding: 16px 20px;
            min-height: 400px;
            overflow-y: auto;
        }

        /* Markdown 预览样式 */
        .preview-content h1 { font-family: var(--font-serif); font-size: 1.875rem; font-weight: 600; color: #1c1917; margin: 0 0 1rem 0; line-height: 1.3; }
        .preview-content h2 { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 600; color: #1c1917; margin: 1.5rem 0 0.75rem 0; }
        .preview-content h3 { font-family: var(--font-serif); font-size: 1.25rem; font-weight: 600; color: #292524; margin: 1.25rem 0 0.5rem 0; }
        .preview-content h4, .preview-content h5, .preview-content h6 { font-family: var(--font-serif); font-size: 1rem; font-weight: 600; color: #44403c; margin: 1rem 0 0.5rem 0; }
        .preview-content p { margin: 0 0 1rem 0; line-height: 1.8; color: #292524; }
        .preview-content ul, .preview-content ol { margin: 0 0 1rem 0; padding-left: 1.5rem; }
        .preview-content li { margin: 0.25rem 0; line-height: 1.7; }
        .preview-content blockquote { margin: 1rem 0; padding: 0.5rem 1rem; border-left: 3px solid #d6d3d1; background: #fafaf9; color: #57534e; font-style: italic; }
        .preview-content blockquote p { margin: 0; }
        .preview-content code { font-family: ui-monospace, monospace; font-size: 0.875em; background: #f5f5f4; padding: 0.125rem 0.375rem; border-radius: 3px; color: #b45309; }
        .preview-content pre { margin: 1rem 0; padding: 1rem; background: #f5f5f4; border-radius: 6px; overflow-x: auto; }
        .preview-content pre code { background: none; padding: 0; color: inherit; font-size: 0.875rem; }
        .preview-content a { color: #2563eb; text-decoration: underline; }
        .preview-content img { max-width: 100%; height: auto; border-radius: 6px; margin: 1rem 0; }
        .preview-content hr { border: none; border-top: 1px solid #e7e5e4; margin: 1.5rem 0; }
        .preview-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .preview-content th, .preview-content td { border: 1px solid #e7e5e4; padding: 0.5rem 0.75rem; text-align: left; }
        .preview-content th { background: #fafaf9; font-weight: 600; }
        .preview-content input[type="checkbox"] { margin-right: 0.5rem; }

        /* 空状态 */
        .preview-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 400px;
            color: #a8a29e;
            font-family: var(--font-serif);
            font-style: italic;
        }

        /* 全屏模式 */
        .fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            background: #fafaf9;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .fullscreen-mode .editor-container {
            flex: 1;
            border-radius: 8px;
        }
        .fullscreen-mode .editor-textarea {
            min-height: calc(100vh - 80px);
        }
        .fullscreen-mode .preview-content {
            min-height: calc(100vh - 80px);
        }
        .fullscreen-mode .preview-empty {
            min-height: calc(100vh - 80px);
        }
        .fullscreen-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            margin-bottom: 12px;
        }
        .fullscreen-header .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .fullscreen-header .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 全屏退出按钮 */
        .exit-fullscreen-btn {
            display: none;
        }
        .fullscreen-mode .exit-fullscreen-btn {
            display: flex;
        }
        .fullscreen-mode .enter-fullscreen-btn {
            display: none;
        }
    </style>
</head>
<body class="bg-[#fafaf9] text-stone-800">

    <div id="normal-mode">
        <div class="max-w-6xl mx-auto px-6 md:px-10 py-10 md:py-14">

            <header class="mb-8 flex items-start justify-between">
                <div>
                    <a href="admin-posts.html" target="admin-frame" class="inline-flex items-center gap-1.5 text-xs text-stone-400 hover:text-stone-900 transition-colors mb-4">
                        <span>←</span> 返回文章列表
                    </a>
                    <p class="text-xs uppercase tracking-widest text-stone-400" id="page-eyebrow">New Post</p>
                    <h1 id="page-title" class="font-serif text-3xl md:text-[2rem] font-medium text-stone-900 mt-2">撰写新文</h1>
                    <p id="page-subtitle" class="text-sm text-stone-500 mt-2">分享一段新的思考</p>
                </div>
                <button type="button" class="enter-fullscreen-btn px-3 py-2 text-xs text-stone-500 hover:text-stone-900 border border-stone-200 rounded-md transition-colors flex items-center gap-1.5" onclick="enterFullscreen()">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    全屏编辑
                </button>
            </header>

            <div id="loading" class="hidden"></div>

            <form id="post-form" class="space-y-6">
                <input type="hidden" id="post-id">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">文章标题</label>
                        <input type="text" id="post-title"
                               class="w-full px-3 py-2.5 bg-white border border-stone-200 rounded-md text-base font-serif focus:outline-none focus:border-stone-500"
                               placeholder="一个能抓住眼球的标题" required>
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">唯一路径 (Slug)</label>
                        <input type="text" id="post-slug"
                               class="w-full px-3 py-2.5 bg-white border border-stone-200 rounded-md text-sm font-mono focus:outline-none focus:border-stone-500"
                               placeholder="例如 d1-blog-guide" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="relative" id="category-container">
                        <label class="block text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">分类</label>
                        <div class="relative">
                            <input type="text" id="post-category"
                                class="w-full px-3 py-2.5 bg-white border border-stone-200 rounded-md text-sm focus:outline-none focus:border-stone-500 transition-colors pr-8"
                                placeholder="技术 / 随笔 / 未分类" autocomplete="off">
                            <div class="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none text-stone-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>

                        <div id="custom-category-list" 
                            class="hidden absolute left-0 right-0 mt-1 max-h-48 overflow-y-auto bg-white border border-stone-200 rounded-md shadow-lg z-50 py-1 transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">导入文章 JSON</label>
                        <input type="text" id="json-import-input"
                            class="w-full px-3 py-2.5 bg-white border border-stone-200 rounded-md text-xs font-mono text-stone-500 focus:outline-none focus:border-stone-500 focus:text-stone-900 transition-colors"
                            placeholder='粘贴 JSON 自动回填 title / slug / category / content'
                            spellcheck="false" autocomplete="off">
                    </div>
                </div>

                <div>
                    <div class="flex items-baseline justify-between mb-1.5">
                        <label class="block text-[10px] uppercase tracking-widest text-stone-400">正文</label>
                        <span class="text-[11px] text-stone-400 word-count">
                            <span id="word-count">0</span> 字
                        </span>
                    </div>

                    <div class="editor-container">
                        <div class="toolbar">
                            <button type="button" class="toolbar-btn" onclick="insertFormat('**', '**')" title="粗体 (Ctrl+B)">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"></path></svg>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertFormat('*', '*')" title="斜体 (Ctrl+I)">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 4h-9M14 20H5M15 4L9 20"></path></svg>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertFormat('~~', '~~')" title="删除线">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12h12M6 4v8M18 20v-8"></path></svg>
                            </button>
                            <div class="toolbar-divider"></div>
                            <button type="button" class="toolbar-btn" onclick="insertLine('# ')" title="一级标题">
                                <span class="font-bold text-xs">H1</span>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertLine('## ')" title="二级标题">
                                <span class="font-bold text-xs">H2</span>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertLine('### ')" title="三级标题">
                                <span class="font-bold text-xs">H3</span>
                            </button>
                            <div class="toolbar-divider"></div>
                            <button type="button" class="toolbar-btn" onclick="insertFormat('`', '`')" title="行内代码">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertCodeBlock()" title="代码块">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M8 10l-2 2 2 2M16 10l2 2-2 2M10 14l-2-2 2-2"></path></svg>
                            </button>
                            <div class="toolbar-divider"></div>
                            <button type="button" class="toolbar-btn" onclick="insertLine('> ')" title="引用">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertLine('- ')" title="无序列表">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertLine('1. ')" title="有序列表">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 20h14M7 12h14M7 4h14M3 20h.01M3 12h.01M3 4h.01"></path></svg>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertTaskList()" title="任务列表">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                            </button>
                            <div class="toolbar-divider"></div>
                            <button type="button" class="toolbar-btn" onclick="insertLink()" title="链接">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertLine('![alt](url)')" title="图片">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertTable()" title="表格">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18M10 3v18M14 3v18M3 3h18v18H3z"></path></svg>
                            </button>
                            <button type="button" class="toolbar-btn" onclick="insertLine('---')" title="分隔线">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14"></path></svg>
                            </button>
                        </div>

                        <div class="editor-pane">
                            <div class="editor-header">
                                <span>Markdown</span>
                            </div>
                            <textarea id="post-content" class="editor-textarea"
                                      placeholder="### 标题&#10;&#10;开始写下你的思考..." required></textarea>
                        </div>

                        <div class="preview-pane">
                            <div class="editor-header">
                                <span>预览</span>
                            </div>
                            <div id="preview-content" class="preview-content">
                                <div class="preview-empty">预览区域</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-3 pt-2 border-t border-stone-200/60">
                    <button type="button" id="submit-btn" onclick="submitPost()"
                            class="px-5 py-2.5 bg-stone-900 hover:bg-stone-800 text-white rounded-md text-sm font-medium transition-colors cursor-pointer">
                        <span id="btn-text">发布到边缘网络</span>
                    </button>
                    <a id="cancel-link" href="admin-posts.html" target="admin-frame"
                       class="px-3 py-2.5 text-stone-500 hover:text-stone-900 text-sm transition-colors">取消</a>
                    <span id="status-text" class="ml-auto text-xs text-stone-400 italic font-serif hidden"></span>
                </div>
            </form>
        </div>
    </div>

    <div id="fullscreen-mode" class="fullscreen-mode" style="display: none;">
        <div class="fullscreen-header">
            <div class="header-left">
                <button type="button" class="exit-fullscreen-btn px-3 py-2 text-xs text-stone-500 hover:text-stone-900 border border-stone-200 rounded-md transition-colors flex items-center gap-1.5" onclick="exitEditorFullscreen()">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    退出全屏
                </button>
                <span class="text-sm text-stone-500">全屏编辑模式</span>
            </div>
            <div class="header-right">
                <span class="text-[11px] text-stone-400 word-count">
                    <span id="word-count-fs">0</span> 字
                </span>
            </div>
        </div>

        <div class="editor-container">
            <div class="toolbar">
                <button type="button" class="toolbar-btn" onclick="insertFormat('**', '**')" title="粗体 (Ctrl+B)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"></path></svg>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertFormat('*', '*')" title="斜体 (Ctrl+I)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 4h-9M14 20H5M15 4L9 20"></path></svg>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertFormat('~~', '~~')" title="删除线">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12h12M6 4v8M18 20v-8"></path></svg>
                </button>
                <div class="toolbar-divider"></div>
                <button type="button" class="toolbar-btn" onclick="insertLine('# ')" title="一级标题">
                    <span class="font-bold text-xs">H1</span>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertLine('## ')" title="二级标题">
                    <span class="font-bold text-xs">H2</span>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertLine('### ')" title="三级标题">
                    <span class="font-bold text-xs">H3</span>
                </button>
                <div class="toolbar-divider"></div>
                <button type="button" class="toolbar-btn" onclick="insertFormat('`', '`')" title="行内代码">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertCodeBlock()" title="代码块">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M8 10l-2 2 2 2M16 10l2 2-2 2M10 14l-2-2 2-2"></path></svg>
                </button>
                <div class="toolbar-divider"></div>
                <button type="button" class="toolbar-btn" onclick="insertLine('> ')" title="引用">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertLine('- ')" title="无序列表">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertLine('1. ')" title="有序列表">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 20h14M7 12h14M7 4h14M3 20h.01M3 12h.01M3 4h.01"></path></svg>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertTaskList()" title="任务列表">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                </button>
                <div class="toolbar-divider"></div>
                <button type="button" class="toolbar-btn" onclick="insertLink()" title="链接">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertLine('![alt](url)')" title="图片">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertTable()" title="表格">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18M10 3v18M14 3v18M3 3h18v18H3z"></path></svg>
                </button>
                <button type="button" class="toolbar-btn" onclick="insertLine('---')" title="分隔线">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14"></path></svg>
                </button>
            </div>

            <div class="editor-pane">
                <div class="editor-header">Markdown</div>
                <textarea id="post-content-fs" class="editor-textarea"
                          placeholder="### 标题&#10;&#10;开始写下你的思考..."></textarea>
            </div>

            <div class="preview-pane">
                <div class="editor-header">预览</div>
                <div id="preview-content-fs" class="preview-content">
                    <div class="preview-empty">预览区域</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const editId = params.get('id');
        const isEdit = !!editId;

        let isFullscreen = false;
        let syncTimer = null;

        function getToken() {
            return localStorage.getItem('admin_token');
        }

        async function validateToken() {
            const token = getToken();
            if (!token) {
                redirectToLogin();
                return false;
            }
            try {
                const res = await fetch('/api/user', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    localStorage.removeItem('admin_token');
                    redirectToLogin();
                    return false;
                }
            } catch (_) {}
            return true;
        }

        function redirectToLogin() {
            if (window.top !== window) {
                window.top.location.href = 'admin.html';
            } else {
                window.location.href = 'admin.html';
            }
        }

        function getTextarea() {
            return isFullscreen
                ? document.getElementById('post-content-fs')
                : document.getElementById('post-content');
        }

        function getPreview() {
            return isFullscreen
                ? document.getElementById('preview-content-fs')
                : document.getElementById('preview-content');
        }

        function getWordCount() {
            return isFullscreen
                ? document.getElementById('word-count-fs')
                : document.getElementById('word-count');
        }

        function updateWordCount() {
            const len = getTextarea().value.length;
            getWordCount().textContent = len;
            updatePreview();
        }

        function updatePreview() {
            const content = getTextarea().value;
            const preview = getPreview();

            if (!content.trim()) {
                preview.innerHTML = '<div class="preview-empty">预览区域</div>';
                return;
            }

            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                },
                breaks: true,
                gfm: true
            });

            try {
                preview.innerHTML = marked.parse(content);
            } catch (e) {
                preview.innerHTML = '<p style="color: #ef4444;">解析错误: ' + e.message + '</p>';
            }
        }

        function insertFormat(before, after) {
            const ta = getTextarea();
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            const selected = ta.value.substring(start, end);

            ta.value = ta.value.substring(0, start) + before + selected + after + ta.value.substring(end);
            ta.selectionStart = start + before.length;
            ta.selectionEnd = start + before.length + selected.length;
            ta.focus();
            updatePreview();
            updateWordCount();
        }

        function insertLine(prefix) {
            const ta = getTextarea();
            const start = ta.selectionStart;
            const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;

            ta.value = ta.value.substring(0, lineStart) + prefix + ta.value.substring(lineStart);
            ta.selectionStart = ta.selectionEnd = lineStart + prefix.length;
            ta.focus();
            updatePreview();
            updateWordCount();
        }

        function insertCodeBlock() {
            const ta = getTextarea();
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            const selected = ta.value.substring(start, end) || '代码';

            const block = '\n```\n' + selected + '\n```\n';
            ta.value = ta.value.substring(0, start) + block + ta.value.substring(end);
            ta.selectionStart = start + 5;
            ta.selectionEnd = start + 5 + selected.length;
            ta.focus();
            updatePreview();
            updateWordCount();
        }

        function insertLink() {
            const ta = getTextarea();
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            const selected = ta.value.substring(start, end) || '链接文字';

            const link = '[' + selected + '](url)';
            ta.value = ta.value.substring(0, start) + link + ta.value.substring(end);
            ta.selectionStart = start + link.length - 4;
            ta.selectionEnd = start + link.length - 1;
            ta.focus();
            updatePreview();
            updateWordCount();
        }

        function insertTable() {
            const ta = getTextarea();
            const start = ta.selectionStart;

            const table = '\n| 列1 | 列2 | 列3 |\n| --- | --- | --- |\n| 内容 | 内容 | 内容 |\n';
            ta.value = ta.value.substring(0, start) + table + ta.value.substring(start);
            ta.selectionStart = ta.selectionEnd = start + table.length;
            ta.focus();
            updatePreview();
            updateWordCount();
        }

        function insertTaskList() {
            const ta = getTextarea();
            const start = ta.selectionStart;

            const task = '\n- [ ] 待办事项1\n- [ ] 待办事项2\n- [x] 已完成事项\n';
            ta.value = ta.value.substring(0, start) + task + ta.value.substring(start);
            ta.selectionStart = ta.selectionEnd = start + task.length;
            ta.focus();
            updatePreview();
            updateWordCount();
        }

        function enterFullscreen() {
            const normalContent = document.getElementById('post-content').value;
            document.getElementById('post-content-fs').value = normalContent;

            document.getElementById('normal-mode').style.display = 'none';
            document.getElementById('fullscreen-mode').style.display = 'flex';
            isFullscreen = true;

            if (window.top !== window) {
                window.top.postMessage({ type: 'hide-sidebar' }, '*');
            }

            updateWordCount();
            getTextarea().focus();
        }

        function exitEditorFullscreen() {
            const fsContent = document.getElementById('post-content-fs').value;
            document.getElementById('post-content').value = fsContent;

            document.getElementById('fullscreen-mode').style.display = 'none';
            document.getElementById('normal-mode').style.display = 'block';
            isFullscreen = false;

            if (window.top !== window) {
                window.top.postMessage({ type: 'exit-fullscreen' }, '*');
            }

            updateWordCount();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isFullscreen) {
                exitEditorFullscreen();
            }
        });

        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'exit-fullscreen' && isFullscreen) {
                exitEditorFullscreen();
            }
        });

        function showStatus(msg, kind) {
            const el = document.getElementById('status-text');
            el.textContent = msg;
            el.classList.remove('hidden');
            el.className = `ml-auto text-xs italic font-serif ${kind === 'error' ? 'text-red-500' : 'text-emerald-600'}`;
            if (kind !== 'error') {
                setTimeout(() => el.classList.add('hidden'), 2400);
            }
        }

        function enterEditMode() {
            document.getElementById('page-eyebrow').textContent = 'Edit Post';
            document.getElementById('page-title').textContent = '编辑文章';
            document.getElementById('page-subtitle').textContent = '修改并保存到边缘数据库';
            document.getElementById('btn-text').textContent = '保存修改';
            document.getElementById('cancel-link').setAttribute('href', `admin-posts.html`);
        }

        async function loadPostForEdit(id) {
            enterEditMode();
            const token = getToken();
            try {
                const res = await fetch('/api/list', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) { redirectToLogin(); return; }
                const result = await res.json();
                if (!result.success) throw new Error('列表拉取失败');

                const post = result.data.find(p => String(p.id) === String(id));
                if (!post) {
                    alert('未找到该文章');
                    return;
                }

                document.getElementById('post-id').value = post.id;
                document.getElementById('post-title').value = post.title || '';
                document.getElementById('post-slug').value = post.slug || '';
                document.getElementById('post-category').value = post.category || '';

                // ⚡ 核心修复：添加动态时间戳 _t=，彻底摧毁浏览器的 Disk Cache 缓存，确保回显绝对实时的正文
                const contentRes = await fetch(`/api/get?slug=${encodeURIComponent(post.slug)}&_t=${Date.now()}`);
                const contentResult = await contentRes.json();
                if (contentResult.success && contentResult.data) {
                    document.getElementById('post-content').value = contentResult.data.content || '';
                }
                updateWordCount();
                updatePreview();
            } catch (e) {
                alert('载入失败: ' + e.message);
            }
        }

        let allCategories = [];

        async function loadCategorySuggestions() {
            try {
                const res = await fetch('/api/list');
                if (res.status === 401) { redirectToLogin(); return; }
                const result = await res.json();
                if (result.success) {
                    allCategories = [...new Set(result.data.map(p => p.category || '未分类'))];
                    renderCustomDropdown(allCategories);
                }
            } catch (e) { /* 忽略 */ }
        }

        function renderCustomDropdown(categories) {
            const dropdown = document.getElementById('custom-category-list');
            dropdown.innerHTML = '';
            
            if (categories.length === 0) {
                dropdown.classList.add('hidden');
                return;
            }

            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'px-3 py-2 text-sm text-stone-700 hover:bg-stone-50 cursor-pointer transition-colors';
                div.textContent = cat;
                
                div.addEventListener('click', (e) => {
                    document.getElementById('post-category').value = cat;
                    dropdown.classList.add('hidden');
                    e.stopPropagation();
                });
                dropdown.appendChild(div);
            });
        }

        function autoSlugify() {
            if (isEdit) return;
            const titleEl = document.getElementById('post-title');
            const slugEl = document.getElementById('post-slug');
            if (slugEl.dataset.touched === '1') return;
            const raw = titleEl.value.trim();
            if (/[^\x00-\x7F]/.test(raw)) {
                slugEl.value = '';
                slugEl.placeholder = '请手动输入英文/数字路径，如 my-post';
                return;
            }
            const text = raw.toLowerCase()
                .replace(/\s+/g, '-')
                .replace(/[^a-z0-9-]/g, '')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
            slugEl.value = text;
            slugEl.placeholder = '例如 d1-blog-guide';
        }

        async function submitPost() {
            const id = document.getElementById('post-id').value;
            const title = document.getElementById('post-title').value.trim();
            const slug = document.getElementById('post-slug').value.trim();
            const category = document.getElementById('post-category').value.trim();
            const content = document.getElementById('post-content').value.trim();
            const token = getToken();

            if (!title || !slug || !content) {
                showStatus('标题、路径、正文 都不能为空', 'error');
                return;
            }
            if (!token) {
                window.top.location.href = 'admin.html';
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.classList.add('opacity-60', 'cursor-wait');

            const url = isEdit ? '/api/update' : '/api/push';
            const body = isEdit
                ? { id: Number(id), title, slug, category, content }
                : { title, slug, category, content };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                const result = await res.json();

                if (result.success) {
                    showStatus(isEdit ? '已保存' : '已发布', 'ok');
                    setTimeout(() => {
                        window.top.document.getElementById('admin-frame').src = 'admin-posts.html';
                    }, 700);
                } else {
                    showStatus('失败: ' + (result.error || '未知错误'), 'error');
                    btn.disabled = false;
                    btn.classList.remove('opacity-60', 'cursor-wait');
                }
            } catch (e) {
                showStatus('请求失败，请检查网络', 'error');
                btn.disabled = false;
                btn.classList.remove('opacity-60', 'cursor-wait');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!(await validateToken())) return;

            const slugEl = document.getElementById('post-slug');
            const titleEl = document.getElementById('post-title');
            const contentEl = document.getElementById('post-content');
            const contentElFs = document.getElementById('post-content-fs');

            slugEl.addEventListener('input', () => slugEl.dataset.touched = '1');
            titleEl.addEventListener('input', autoSlugify);

            const categoryInput = document.getElementById('post-category');
            const customDropdown = document.getElementById('custom-category-list');

            categoryInput.addEventListener('focus', () => {
                if (allCategories.length > 0) {
                    customDropdown.classList.remove('hidden');
                }
            });

            categoryInput.addEventListener('input', () => {
                const value = categoryInput.value.trim().toLowerCase();
                const filtered = allCategories.filter(cat => cat.toLowerCase().includes(value));
                renderCustomDropdown(filtered);
                customDropdown.classList.remove('hidden');
            });

            document.addEventListener('click', (e) => {
                const container = document.getElementById('category-container');
                if (container && !container.contains(e.target)) {
                    customDropdown.classList.add('hidden');
                }
            });

            contentEl.addEventListener('input', () => {
                if (isFullscreen) {
                    document.getElementById('post-content-fs').value = contentEl.value;
                    updateWordCount();
                } else {
                    updateWordCount();
                }
            });

            contentElFs.addEventListener('input', () => {
                if (isFullscreen) {
                    document.getElementById('post-content').value = contentElFs.value;
                    updateWordCount();
                }
            });

            contentEl.addEventListener('keydown', (e) => {
                if (isFullscreen) return;
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'b') {
                        e.preventDefault();
                        isFullscreen = false;
                        insertFormat('**', '**');
                    } else if (e.key === 'i') {
                        e.preventDefault();
                        isFullscreen = false;
                        insertFormat('*', '*');
                    }
                }
            });

            contentElFs.addEventListener('keydown', (e) => {
                if (!isFullscreen) return;
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'b') {
                        e.preventDefault();
                        insertFormat('**', '**');
                    } else if (e.key === 'i') {
                        e.preventDefault();
                        insertFormat('*', '*');
                    }
                }
            });

            const jsonImportEl = document.getElementById('json-import-input');
            jsonImportEl.addEventListener('input', () => {
                const raw = jsonImportEl.value;
                const trimmed = raw.trim();
                if (!trimmed) return;
                if (trimmed[0] !== '{' && trimmed[0] !== '[') return;
                let data;
                try {
                    data = JSON.parse(trimmed);
                } catch (_) {
                    return;
                }
                if (!data || typeof data !== 'object') return;

                if (typeof data.title === 'string') {
                    document.getElementById('post-title').value = data.title;
                }
                if (typeof data.slug === 'string') {
                    const slugEl = document.getElementById('post-slug');
                    slugEl.value = data.slug;
                    slugEl.dataset.touched = '1';
                }
                if (typeof data.category === 'string') {
                    document.getElementById('post-category').value = data.category;
                }
                if (typeof data.content === 'string') {
                    const normalEl = document.getElementById('post-content');
                    const fsEl = document.getElementById('post-content-fs');
                    normalEl.value = data.content;
                    fsEl.value = data.content;
                    updateWordCount();
                }
            });

            if (isEdit) {
                loadPostForEdit(editId);
            } else {
                loadCategorySuggestions();
                updatePreview();
            }
        });
    </script>
</body>
</html>
