<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc@5.0.12/index.css">
    <style>
        :root {
            --font-serif: 'Newsreader', 'Songti SC', 'STSong', serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body { font-family: var(--font-sans); }

        .font-serif { font-family: var(--font-serif); }

        /* 优雅的下划线动画 */
        .link-underline {
            background-image: linear-gradient(currentColor, currentColor);
            background-size: 0% 1px;
            background-repeat: no-repeat;
            background-position: 0 100%;
            transition: background-size 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .group:hover .link-underline,
        .link-underline:hover {
            background-size: 100% 1px;
        }

        /* 列表入场 */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.6s ease-out both; }
    </style>
</head>
<body class="bg-[#fafaf9] text-stone-800 min-h-screen selection:bg-stone-200">

    <div class="max-w-2xl mx-auto px-6 py-20 md:py-28">
        <header class="mb-20">
            <h1 id="site-title" class="hidden font-serif text-4xl md:text-5xl font-medium tracking-tight text-stone-900">
            </h1>
            <p id="site-subtitle" class="hidden mt-3 text-stone-500 text-sm tracking-wide">
            </p>
            <div id="site-skeleton">
                <div class="h-10 md:h-12 w-48 md:w-64 bg-stone-200/80 rounded"></div>
                <div class="h-4 w-72 md:w-96 bg-stone-200/80 rounded mt-3"></div>
            </div>
        </header>

        <div id="status-loading" class="hidden">
        </div>

        <div id="status-empty" class="hidden py-20 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic">这里还很安静</p>
        </div>

        <div id="status-error" class="hidden py-16 text-stone-400 text-sm tracking-wider">
            <span class="font-serif italic">数据获取失败</span> · 请刷新重试
        </div>

        <main id="posts-container" class="hidden divide-y divide-stone-200/70">
        </main>

        <div id="posts-skeleton" class="divide-y divide-stone-200/70">
            <div class="py-7">
                <div class="h-6 bg-stone-200/80 rounded w-3/4 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/3 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-full mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-11/12 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-2/3"></div>
            </div>
            <div class="py-7">
                <div class="h-6 bg-stone-200/80 rounded w-2/3 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/4 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-full mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-5/6 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-3/5 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/2"></div>
            </div>
            <div class="py-7">
                <div class="h-6 bg-stone-200/80 rounded w-4/5 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/3 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-11/12 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-full mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-2/3 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-3/5"></div>
            </div>
            <div class="py-7">
                <div class="h-6 bg-stone-200/80 rounded w-1/2 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/4 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-full mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-4/5 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/2 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-2/3"></div>
            </div>
            <div class="py-7">
                <div class="h-6 bg-stone-200/80 rounded w-3/5 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/3 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-full mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-11/12 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/2"></div>
            </div>
            <div class="py-7">
                <div class="h-6 bg-stone-200/80 rounded w-2/3 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/4 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-full mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-5/6 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-2/3 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-3/5"></div>
            </div>
        </div>
    </div>

    <footer class="max-w-2xl mx-auto px-6 pb-12 text-center text-stone-400 text-xs tracking-widest uppercase">
        — End of Stream —
    </footer>

    <script>
        const DEFAULT_SETTINGS = {
            site_title:      "",
            site_subtitle:   "",
            show_views:      "1",
            excerpt_length:  "200"
        };

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const result = await res.json();
                if (result.success && result.data) {
                    return Object.assign({}, DEFAULT_SETTINGS, result.data);
                }
            } catch (e) { /* 用默认值 */ }
            return Object.assign({}, DEFAULT_SETTINGS);
        }

        function applySettings(s) {
            if (s.site_title) {
                document.getElementById('site-title').textContent = s.site_title;
                document.getElementById('site-title').classList.remove('hidden');
                document.title = s.site_title;
            }
            if (s.site_subtitle) {
                document.getElementById('site-subtitle').textContent = s.site_subtitle;
                document.getElementById('site-subtitle').classList.remove('hidden');
            }
            if (s.site_title || s.site_subtitle) {
                document.getElementById('site-skeleton').classList.add('hidden');
            }
        }

        async function loadArticles() {
            const loadingEl = document.getElementById('status-loading');
            const emptyEl   = document.getElementById('status-empty');
            const errorEl   = document.getElementById('status-error');
            const listEl    = document.getElementById('posts-container');

            try {
                // 1) 站点设置与极致精简的文章列表并行拉取
                const [settings, listRes] = await Promise.all([
                    loadSettings(),
                    fetch('/api/list').then(r => r.json()).catch(() => ({ success: false, error: 'network' }))
                ]);
                
                applySettings(settings);
                const showViews = String(settings.show_views) === '1';

                loadingEl.classList.add('hidden');

                // 2) 接口返回失败时切换到错误态
                if (!listRes.success) {
                    errorEl.classList.remove('hidden');
                    document.getElementById('posts-skeleton').classList.add('hidden');
                    return;
                }

                // 3) 渲染列表
                if (Array.isArray(listRes.data) && listRes.data.length > 0) {
                    listEl.classList.remove('hidden');
                    document.getElementById('posts-skeleton').classList.add('hidden');

                    listEl.innerHTML = listRes.data.map((post, i) => `
                        <article class="fade-up py-7 group" style="animation-delay: ${i * 40}ms">
                            <a href="/post.html?slug=${encodeURIComponent(post.slug || '')}" class="block">
                                <div class="flex flex-col md:flex-row md:items-baseline justify-between gap-2 md:gap-6">
                                    <h2 class="font-serif text-xl md:text-[1.35rem] leading-snug text-stone-900 group-hover:text-stone-600 transition-colors">
                                        <span class="link-underline pb-0.5">${escapeHtml(post.title)}</span>
                                    </h2>
                                    <div class="flex items-center gap-3 text-xs text-stone-400 tabular-nums tracking-wider pt-1 md:pt-1.5">
                                        ${showViews ? `
                                        <span class="flex items-center gap-1 font-sans">
                                            <svg class="w-3.5 h-3.5 opacity-70" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            </svg>
                                            ${post.views || 0}
                                        </span>
                                        <span>·</span>
                                        ` : ''}
                                        <time class="font-sans">${formatDate(post.created_at)}</time>
                                    </div>
                                </div>
                                ${post.excerpt ? `
                                <p class="mt-2.5 font-serif text-stone-500 text-[0.95rem] leading-relaxed">
                                    ${escapeHtml(post.excerpt)}
                                </p>
                                ` : ''}
                            </a>
                        </article>
                    `).join('');
                } else {
                    emptyEl.classList.remove('hidden');
                    document.getElementById('posts-skeleton').classList.add('hidden');
                }
            } catch (err) {
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                document.getElementById('posts-skeleton').classList.add('hidden');
            }
        }

        function formatDate(ts) {
            const d = new Date(ts);
            if (isNaN(d)) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y} · ${m} · ${day}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        document.addEventListener('DOMContentLoaded', loadArticles);
    </script>
</body>
</html>
