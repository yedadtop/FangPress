<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title data-ssr="site-title"></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --font-serif: serif;
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        body { font-family: var(--font-sans); }

        .font-serif { font-family: var(--font-serif); }

        /* 优雅的下划线动画 */
        .link-underline {
            background-image: linear-gradient(currentColor, currentColor);
            background-size: 0% 1px;
            background-repeat: no-repeat;
            background-position: 0 100%;
            transition: background-size 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .group:hover .link-underline,
        .link-underline:hover {
            background-size: 100% 1px;
        }

        /* 列表入场动画 */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.6s ease-out both; }
    </style>
</head>
<body class="bg-[#fafaf9] text-stone-800 min-h-screen selection:bg-stone-200">

    <div class="max-w-2xl mx-auto px-6 py-20 md:py-28">
        <header class="mb-20">
            <h1 id="ssr-site-title" data-ssr="site-title" class="hidden font-serif text-4xl md:text-5xl font-medium tracking-tight text-stone-900">
            </h1>
            <p id="ssr-site-subtitle" data-ssr="site-subtitle" class="hidden mt-3 text-stone-500 text-sm tracking-wide">
            </p>
            <div id="site-skeleton">
                <div class="h-10 md:h-12 w-48 md:w-64 bg-stone-200/80 rounded"></div>
                <div class="h-4 w-72 md:w-96 bg-stone-200/80 rounded mt-3"></div>
            </div>
        </header>

        <div id="status-loading" class="hidden">
        </div>

        <div id="status-empty" class="hidden py-20 text-center">
            <div class="inline-block w-12 h-px bg-stone-300 mb-6"></div>
            <p class="font-serif text-stone-500 text-base italic">这里还很安静</p>
        </div>

        <div id="status-error" class="hidden py-16 text-stone-400 text-sm tracking-wider">
            <span class="font-serif italic">数据获取失败</span> · 请刷新重试
        </div>

        <main id="ssr-post-list" data-ssr="post-list" class="hidden divide-y divide-stone-200/70">
        </main>

        <div id="posts-skeleton" class="divide-y divide-stone-200/70">
            <div class="py-7">
                <div class="h-6 bg-stone-200/80 rounded w-3/4 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/3 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-full mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-11/12 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-2/3"></div>
            </div>
            <div class="py-7">
                <div class="h-6 bg-stone-200/80 rounded w-2/3 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/4 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-full mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-5/6 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-3/5 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/2"></div>
            </div>
            <div class="py-7">
                <div class="h-6 bg-stone-200/80 rounded w-4/5 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-1/3 mb-3"></div>
                <div class="h-3 bg-stone-200/80 rounded w-11/12 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-full mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-2/3 mb-2"></div>
                <div class="h-3 bg-stone-200/80 rounded w-3/5"></div>
            </div>
        </div>
    </div>

    <footer class="max-w-2xl mx-auto px-6 pb-12 text-center text-stone-400 text-xs tracking-widest uppercase">
        — End of Stream —
    </footer>

    <!-- Edge SSR: 由 Cloudflare Worker (functions/[[path]].js) 在边缘完成数据注入。
         客户端不再发起 fetch；HTMLRewriter 将通过以下标识进行定位：
           - title / meta[name="description"]          站点标题与描述
           - #ssr-site-title / #ssr-site-subtitle      站点名/副标题
           - #ssr-post-list                            文章列表容器
           - #status-error / #status-empty / #posts-skeleton  失败/空/骨架降级
    -->
</body>
</html>
